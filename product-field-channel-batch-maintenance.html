<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品字段渠道批量维护</title>
  <style>
    :root {
      --el-blue: #409eff;
      --el-blue-light: #ecf5ff;
      --el-blue-border: #d9ecff;
      --el-green: #67c23a;
      --el-orange: #e6a23c;
      --el-red: #f56c6c;
      --text-main: #303133;
      --text-regular: #606266;
      --text-secondary: #909399;
      --border: #dcdfe6;
      --border-light: #ebeef5;
      --fill-page: #f5f7fa;
      --fill-light: #f8fafc;
      --white: #fff;
      --shadow-bar: 0 -4px 14px rgba(31, 45, 61, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1180px;
      min-height: 100vh;
      background: var(--fill-page);
      color: var(--text-main);
      font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
    }

    body.is-dialog-open {
      position: fixed;
      left: 0;
      right: 0;
      width: 100%;
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      padding: 12px 12px 72px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .page-header,
    .filter-panel,
    .table-panel {
      background: var(--white);
      border: 1px solid #e4e7ed;
      border-radius: 6px;
    }

    .page-header {
      min-height: 58px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }

    .title-wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-title {
      display: flex;
      align-items: center;
      min-width: 0;
      margin: 0;
      color: var(--text-main);
      font-size: 18px;
      line-height: 26px;
      font-weight: 600;
    }

    .page-title::before,
    .panel-title::before {
      content: "";
      width: 4px;
      height: 18px;
      margin-right: 10px;
      border-radius: 2px;
      background: var(--el-blue);
      flex-shrink: 0;
    }

    .header-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .meta-tag {
      height: 24px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      border: 1px solid #e1f3d8;
      border-radius: 4px;
      background: #f0f9eb;
      color: #529b2e;
      font-size: 12px;
    }

    .header-actions,
    .query-actions,
    .dimension-actions,
    .dialog-actions,
    .footer-actions,
    .table-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .filter-panel {
      flex-shrink: 0;
      padding: 14px 16px 4px;
    }

    .filter-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .panel-title {
      min-width: 0;
      display: flex;
      align-items: center;
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
    }

    .dimension-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr) 52px;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-top: 1px solid var(--border-light);
    }

    .dimension-row:first-of-type {
      border-top: 0;
    }

    .dimension-label {
      padding-top: 7px;
      color: var(--text-regular);
      text-align: right;
      font-weight: 600;
      white-space: nowrap;
    }

    .dimension-mode-select {
      position: relative;
      display: inline-block;
      width: 86px;
      text-align: left;
      font-weight: 500;
    }

    .dimension-mode-trigger {
      height: 26px;
      width: 100%;
      padding: 0 22px 0 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      color: var(--text-regular);
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      line-height: 24px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .dimension-mode-trigger:hover,
    .dimension-mode-select.is-open .dimension-mode-trigger {
      border-color: var(--el-blue);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .08);
    }

    .dimension-mode-trigger::after {
      content: "⌄";
      position: absolute;
      right: 8px;
      top: 3px;
      color: #c0c4cc;
      font-size: 12px;
      pointer-events: none;
    }

    .dimension-mode-menu {
      display: none;
      position: absolute;
      top: 30px;
      right: 0;
      z-index: 25;
      min-width: 96px;
      padding: 4px 0;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(31, 45, 61, .14);
    }

    .dimension-mode-select.is-open .dimension-mode-menu {
      display: block;
    }

    .dimension-mode-option {
      height: 30px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      cursor: pointer;
      color: var(--text-regular);
      font-size: 12px;
    }

    .dimension-mode-option:hover,
    .dimension-mode-option.is-active {
      background: var(--el-blue-light);
      color: var(--el-blue);
    }

    .required-dot {
      margin-right: 4px;
      color: var(--el-red);
      font-weight: 700;
    }

    .tag-box {
      min-height: 40px;
      max-height: 68px;
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--white);
      display: flex;
      align-content: flex-start;
      flex-wrap: wrap;
      gap: 6px;
      overflow-y: auto;
      cursor: pointer;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .tag-box:hover {
      border-color: var(--el-blue);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .08);
    }

    .tag-box.is-empty {
      align-items: center;
    }

    .placeholder {
      color: #c0c4cc;
      line-height: 24px;
    }

    .el-tag {
      max-width: 220px;
      height: 24px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--el-blue-border);
      border-radius: 4px;
      background: var(--el-blue-light);
      color: var(--el-blue);
      font-size: 12px;
      line-height: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .el-tag.is-success {
      border-color: #e1f3d8;
      background: #f0f9eb;
      color: #529b2e;
    }

    .el-tag.is-warning {
      border-color: #faecd8;
      background: #fdf6ec;
      color: #b88230;
    }

    .el-tag.is-info {
      border-color: #f0f2f5;
      background: #fafafa;
      color: #909399;
    }

    .el-tag.is-danger {
      border-color: #fde2e2;
      background: #fef0f0;
      color: var(--el-red);
    }

    .el-tag.is-danger .tag-close {
      background: rgba(245, 108, 108, .14);
      color: var(--el-red);
    }

    .el-tag.is-danger .tag-close:hover {
      background: var(--el-red);
      color: #fff;
    }

    .tag-close {
      width: 14px;
      height: 14px;
      border: 0;
      border-radius: 50%;
      padding: 0;
      background: rgba(64, 158, 255, .14);
      color: var(--el-blue);
      line-height: 14px;
      cursor: pointer;
    }

    .tag-close:hover {
      background: var(--el-blue);
      color: #fff;
    }

    .dimension-actions {
      padding-top: 4px;
      justify-content: flex-start;
    }

    .count-text {
      min-width: 42px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .el-button {
      min-width: 32px;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--white);
      color: var(--text-regular);
      cursor: pointer;
      outline: none;
      transition: color .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .el-button:hover {
      color: var(--el-blue);
      border-color: #c6e2ff;
      background: var(--el-blue-light);
    }

    .el-button:disabled,
    .el-button:disabled:hover {
      color: #c0c4cc;
      border-color: #ebeef5;
      background: #f5f7fa;
      cursor: not-allowed;
      opacity: .72;
    }

    .el-button.primary {
      border-color: var(--el-blue);
      background: var(--el-blue);
      color: #fff;
    }

    .el-button.primary:hover {
      border-color: #66b1ff;
      background: #66b1ff;
      color: #fff;
    }

    .el-button.primary:disabled,
    .el-button.primary:disabled:hover {
      border-color: #dcdfe6;
      background: #f5f7fa;
      color: #c0c4cc;
      cursor: not-allowed;
      opacity: .72;
    }

    .el-button.plain {
      background: #fff;
    }

    .el-button.success.plain {
      color: var(--el-green);
      border-color: #c2e7b0;
      background: #f0f9eb;
    }

    .el-button.success.plain:hover {
      color: #fff;
      border-color: var(--el-green);
      background: var(--el-green);
    }

    .el-button.info.plain {
      color: #909399;
      border-color: #d3d4d6;
      background: #f4f4f5;
    }

    .el-button.info.plain:hover {
      color: #fff;
      border-color: #909399;
      background: #909399;
    }

    .el-button.danger.plain {
      color: var(--el-red);
      border-color: #fbc4c4;
      background: #fef0f0;
    }

    .el-button.danger.plain:hover {
      color: #fff;
      border-color: var(--el-red);
      background: var(--el-red);
    }

    .el-button.text {
      height: 26px;
      min-width: 0;
      padding: 0 4px;
      border: 0;
      background: transparent;
      color: var(--el-blue);
    }

    .el-button.text:hover {
      color: #66b1ff;
      background: transparent;
    }

    .el-button.danger-text {
      color: var(--el-red);
    }

    .el-button.small {
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
    }

    .icon-button {
      width: 32px;
      padding: 0;
    }

    .table-panel {
      flex: none;
      height: calc(100vh - 88px);
      min-height: 620px;
      scroll-margin-top: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-toolbar {
      min-height: 54px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .table-summary {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-regular);
      font-size: 13px;
    }

    .summary-pill {
      width: 108px;
      height: 24px;
      padding: 0 8px;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      background: #fafafa;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      white-space: nowrap;
    }

    .summary-pill.is-total {
      border-color: #d9ecff;
      background: #f5faff;
      color: #337ecc;
    }

    .summary-pill.is-change {
      border-color: #f3e4c9;
      background: #fffaf2;
      color: #b88230;
    }

    .summary-pill.is-add {
      border-color: #e1f3d8;
      background: #f7fcf3;
      color: #529b2e;
    }

    .summary-pill.is-delete {
      border-color: #fde2e2;
      background: #fff7f7;
      color: #c45656;
    }

    .summary-number {
      color: var(--text-main);
      font-weight: 600;
    }

    .search-inline {
      width: 260px;
      height: 32px;
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--white);
      overflow: hidden;
    }

    .search-inline .search-icon {
      width: 34px;
      color: #c0c4cc;
      text-align: center;
      flex-shrink: 0;
    }

    .search-inline input {
      width: 100%;
      height: 30px;
      border: 0;
      outline: none;
      color: var(--text-main);
    }

    .search-clear {
      width: 24px;
      height: 24px;
      min-width: 24px;
      margin-right: 4px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #c0c4cc;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 24px;
      font-size: 14px;
    }

    .search-clear.is-visible {
      display: inline-flex;
    }

    .search-clear:hover {
      background: #f4f4f5;
      color: #909399;
    }

    .table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      position: relative;
      scrollbar-width: thin;
      scrollbar-color: #d4d7de transparent;
    }

    .table-wrap::-webkit-scrollbar {
      width: 7px;
      height: 6px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      border-radius: 8px;
      background: #d4d7de;
    }

    .table-wrap::-webkit-scrollbar-thumb:hover {
      background: #b8bcc6;
    }

    table {
      width: 100%;
      min-width: 1560px;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      color: var(--text-regular);
      font-size: 13px;
    }

    th,
    td {
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      padding: 6px 8px;
      height: 40px;
      text-align: left;
      vertical-align: middle;
      background: #fff;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fafafa;
      color: var(--text-regular);
      font-weight: 600;
      white-space: nowrap;
    }

    th.action-col,
    td.action-col {
      position: sticky;
      right: 0;
      box-shadow: -8px 0 12px rgba(31, 45, 61, .05);
    }

    th.action-col {
      z-index: 5;
    }

    td.action-col {
      z-index: 3;
    }

    tbody tr:nth-child(even) td {
      background: #fcfcfd;
    }

    tbody tr:hover td {
      background: #f5f9ff;
    }

    tbody tr.is-dirty td {
      background: #fff9e8;
    }

    tbody tr.is-dirty:hover td {
      background: #fff4d6;
    }

    tbody tr.is-new td {
      background: #f0f9eb;
    }

    tbody tr.is-new:hover td {
      background: #e8f6df;
    }

    tbody tr.is-deleted td {
      background: #fef0f0;
      color: #909399;
      text-decoration: line-through;
    }

    tbody tr.is-deleted:hover td {
      background: #fde2e2;
    }

    tbody tr.is-editing td {
      background: #f5f9ff;
    }

    .select-col {
      width: 46px;
      text-align: center;
    }

    .select-col input {
      width: 14px;
      height: 14px;
      cursor: pointer;
      vertical-align: middle;
    }

    .cell-ellipsis {
      max-width: 100%;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-type {
      display: inline-flex;
      height: 20px;
      padding: 0 6px;
      align-items: center;
      border-radius: 4px;
      border: 1px solid #f0f2f5;
      background: #fafafa;
      color: #909399;
      font-size: 12px;
    }

    .value-input,
    .value-select,
    .value-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      color: var(--text-main);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
      font-size: 12px;
    }

    .value-input,
    .value-select {
      height: 32px;
      padding: 0 9px;
    }

    .value-select.is-multiple {
      height: 58px;
      padding: 4px 7px;
    }

    .value-textarea {
      min-height: 54px;
      padding: 6px 8px;
      resize: vertical;
      line-height: 20px;
    }

    .value-input:focus,
    .value-select:focus,
    .value-textarea:focus {
      border-color: var(--el-blue);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .08);
    }

    .inline-el-control {
      position: relative;
      width: 100%;
      min-width: 0;
    }

    .inline-el-control .value-input,
    .inline-el-control .value-select {
      height: 32px;
      border-color: #dcdfe6;
      border-radius: 4px;
      color: #606266;
      box-shadow: none;
    }

    .inline-el-control .value-input:hover,
    .inline-el-control .value-select:hover {
      border-color: #c0c4cc;
    }

    .inline-el-control .value-input:focus,
    .inline-el-control .value-select:focus {
      border-color: var(--el-blue);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .08);
    }

    .inline-el-control.is-select .value-select,
    .inline-el-control.is-time .value-input {
      padding-right: 28px;
    }

    .inline-el-control.is-select .value-select {
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .inline-el-control.is-select::after {
      content: "⌄";
      position: absolute;
      right: 10px;
      top: 50%;
      color: #c0c4cc;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 12px;
    }

    .inline-el-control.is-time::after {
      content: "◷";
      position: absolute;
      right: 10px;
      top: 50%;
      color: #c0c4cc;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 13px;
    }

    .inline-el-control.is-multiple:not(.inline-select-control) {
      min-height: 58px;
    }

    .inline-el-control.is-multiple:not(.inline-select-control) .value-select {
      min-height: 58px;
      border-color: #dcdfe6;
      background: linear-gradient(#fff, #fff);
    }

    .inline-el-control.is-textarea .value-textarea {
      border-color: #dcdfe6;
      border-radius: 4px;
      color: #606266;
    }

    .inline-el-control.is-textarea .value-textarea:hover {
      border-color: #c0c4cc;
    }

    .inline-select-control {
      position: relative;
      height: 32px;
      min-height: 32px;
      line-height: 32px;
    }

    .inline-select-trigger {
      height: 32px;
      min-height: 32px;
      max-height: 32px;
      width: 100%;
      padding: 0 28px 0 9px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      background: #fff;
      color: #606266;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      line-height: 30px;
      text-align: left;
      overflow: hidden;
      box-sizing: border-box;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .inline-select-trigger:hover,
    .inline-select-control.is-open .inline-select-trigger {
      border-color: var(--el-blue);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .08);
    }

    .inline-select-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .inline-select-arrow {
      position: absolute;
      right: 10px;
      top: 16px;
      color: #c0c4cc;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 12px;
    }

    .inline-select-dropdown {
      display: none;
      position: absolute;
      top: 36px;
      left: 0;
      z-index: 30;
      min-width: 100%;
      width: max(100%, 148px);
      max-height: 220px;
      padding: 6px 0;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(31, 45, 61, .14);
      overflow: auto;
      line-height: normal;
    }

    .inline-select-control.is-open .inline-select-dropdown {
      display: block;
    }

    .inline-select-option {
      height: 32px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #606266;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .inline-select-option:hover {
      background: var(--el-blue-light);
      color: var(--el-blue);
    }

    .inline-select-option.is-active {
      color: var(--el-blue);
      font-weight: 600;
      background: #f5faff;
    }

    .inline-select-check {
      width: 14px;
      height: 14px;
      border: 1px solid #dcdfe6;
      border-radius: 2px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      flex-shrink: 0;
    }

    .inline-select-option.is-active .inline-select-check {

    .selected-list {
      flex: 1;
      min-height: 0;
      padding: 10px;
      overflow: auto;
      display: flex;
      align-content: flex-start;
      flex-wrap: wrap;
      gap: 6px;
    }

    .selected-list.field-selected-list {
      display: block;
      padding: 8px;
    }

    .dialog-footer {
      height: 56px;
      padding: 10px 16px;
      border-top: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .edit-dialog {
      width: min(980px, calc(100vw - 64px));
      height: min(660px, calc(100vh - 72px));
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .edit-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      background: var(--fill-light);
    }

    .form-section-title {
      min-height: 32px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      color: var(--text-main);
      font-size: 16px;
      font-weight: 600;
    }

    .form-section-title::before {
      content: "";
      width: 4px;
      height: 16px;
      margin-right: 10px;
      border-radius: 2px;
      background: var(--el-blue);
    }

    .edit-form-card {
      border: 1px solid #dfe5f2;
      border-radius: 6px;
      background: #fff;
      padding: 16px;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 14px 18px;
    }

    .edit-field {
      min-width: 0;
    }

    .edit-field.is-wide {
      grid-column: 1 / -1;
    }

    .edit-label {
      margin-bottom: 6px;
      color: var(--text-regular);
      font-weight: 600;
    }

    .upload-mock {
      border: 1px dashed #d9d9d9;
      border-radius: 4px;
      background: #fff;
      padding: 0;
      overflow: hidden;
    }

    .upload-dragger {
      min-height: 164px;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fbfdff;
      text-align: center;
      transition: border-color .15s ease, background .15s ease;
    }

    .upload-mock:hover {
      border-color: var(--el-blue);
    }

    .upload-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--el-blue-light);
      color: var(--el-blue);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .upload-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .upload-title {
      color: var(--text-main);
      font-size: 13px;
    }

    .upload-title em {
      color: var(--el-blue);
      font-style: normal;
    }

    .upload-button {
      height: 32px;
      margin-top: 4px;
      padding: 0 14px;
      border: 1px solid var(--el-blue);
      border-radius: 4px;
      background: #fff;
      color: var(--el-blue);
      cursor: pointer;
      font-size: 13px;
    }

    .upload-button:hover {
      background: var(--el-blue-light);
    }

    .upload-tip {
      color: var(--text-secondary);
      font-size: 12px;
    }

    .upload-file-list {
      margin: 0;
      padding: 8px 12px 10px;
      border-top: 1px solid var(--border-light);
      list-style: none;
      background: #fff;
    }

    .upload-file-item {
      height: 28px;
      padding: 0 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #606266;
      font-size: 12px;
    }

    .upload-file-item:hover {
      background: #f5f7fa;
      color: var(--el-blue);
    }

    .upload-file-name {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-icon-mini {
      width: 14px;
      height: 14px;
      color: #909399;
      flex-shrink: 0;
    }

    .upload-icon-mini svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
    }

    .upload-file-remove {
      border: 0;
      background: transparent;
      color: #c0c4cc;
      cursor: pointer;
      font-size: 14px;
    }

    .upload-empty {
      height: 28px;
      display: flex;
      align-items: center;
      color: #c0c4cc;
      font-size: 12px;
    }

    .upload-hidden-value {
      margin: 10px 12px 12px;
    }

    .upload-hidden-value .value-input {
      background: #fafafa;
      color: #606266;
    }

    .richtext-toolbar {
      height: 34px;
      border: 1px solid var(--border);
      border-bottom: 0;
      border-radius: 4px 4px 0 0;
      background: #fafafa;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .richtext-toolbar span {
      height: 22px;
      min-width: 22px;
      padding: 0 6px;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid var(--border-light);
    }

    .richtext-editor {
      border-radius: 0 0 4px 4px;
      min-height: 120px;
    }

    .batch-dialog {
      width: min(1480px, calc(100vw - 48px));
      height: min(820px, calc(100vh - 56px));
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .18);
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    .batch-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      background: var(--fill-light);
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .batch-grid {
      border: 1px solid #dfe5f2;
      border-radius: 6px;
      background: #fff;
      padding: 4px 14px;
      min-width: 0;
      flex-shrink: 0;
    }

    .batch-edit-card {
      border: 1px solid #dfe5f2;
      border-radius: 6px;
      background: #fff;
      padding: 14px;
      min-width: 0;
      min-height: 0;
      flex: 0 0 100%;
      display: flex;
      flex-direction: column;
    }

    .batch-edit-list {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      overflow: auto;
      background: #fff;
      scrollbar-width: thin;
    }

    .batch-edit-item {
      min-width: 0;
    }

    .batch-edit-table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .batch-edit-table th,
    .batch-edit-table td {
      height: 38px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border-light);
      text-align: left;
      vertical-align: middle;
    }

    .batch-edit-table th {
      background: #f7f8fa;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 12px;
    }

    .batch-edit-table tr:last-child td {
      border-bottom: 0;
    }

    .batch-edit-table .product-col {
      width: 30%;
    }

    .batch-edit-table .field-col {
      width: 22%;
    }

    .batch-edit-table .channel-col {
      width: 22%;
    }

    .batch-edit-table .value-col {
      width: 26%;
    }

    .batch-edit-table .value-input,
    .batch-edit-table .value-select {
      width: 100%;
    }

    .batch-dialog-value {
      min-height: 30px;
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      color: var(--text-regular);
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      box-sizing: border-box;
    }

    .batch-dialog-value:hover {
      border-color: var(--el-blue);
      color: var(--el-blue);
    }

    .batch-value-select,
    .batch-time-control {
      height: 30px;
    }

    .batch-value-select .inline-select-trigger,
    .batch-time-control .value-input {
      height: 30px;
      min-height: 30px;
      max-height: 30px;
      line-height: 28px;
    }

    .batch-value-select .inline-select-arrow {
      top: 15px;
    }

    .batch-time-control .inline-time-button {
      height: 28px;
      width: 28px;
      line-height: 28px;
    }

    .batch-time-control .inline-time-panel,
    .batch-value-select .inline-select-dropdown {
      z-index: 120;
    }

    .batch-time-control.is-floating .inline-time-panel,
    .batch-value-select.is-floating .inline-select-dropdown {
      position: fixed;
      top: var(--floating-top);
      left: var(--floating-left);
      width: var(--floating-width);
      display: block;
    }

    .batch-channel-select {
      position: relative;
      width: 100%;
      min-width: 0;
    }

    .batch-channel-hidden {
      display: none;
    }

    .batch-channel-trigger {
      height: 30px;
      width: 100%;
      min-width: 0;
      padding: 0 28px 0 9px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      box-sizing: border-box;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }

    .batch-channel-trigger:hover,
    .batch-channel-select.is-open .batch-channel-trigger {
      border-color: var(--el-blue);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .08);
    }

    .batch-channel-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .batch-channel-arrow {
      position: absolute;
      right: 10px;
      top: 50%;
      color: #c0c4cc;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 10px;
    }

    .batch-channel-dropdown {
      display: none;
      position: absolute;
      top: 34px;
      left: 0;
      z-index: 90;
      width: max(100%, 240px);
      max-height: 220px;
      padding: 6px 0;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(31, 45, 61, .14);
      overflow: auto;
    }

    .batch-channel-select.is-open .batch-channel-dropdown {
      display: block;
    }

    .batch-channel-select.is-floating .batch-channel-dropdown {
      position: fixed;
      top: var(--floating-top);
      left: var(--floating-left);
      width: var(--floating-width);
      display: block;
      z-index: 120;
    }

    .batch-channel-option {
      height: 32px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--text-regular);
      cursor: pointer;
      font-size: 12px;
    }

    .batch-channel-option:hover {
      background: var(--el-blue-light);
      color: var(--el-blue);
    }

    .batch-channel-option.is-active {
      color: var(--el-blue);
      font-weight: 600;
      background: #f5faff;
    }

    .batch-channel-group {
      color: var(--text-secondary);
      font-size: 11px;
      flex-shrink: 0;
    }

    .batch-empty {
      min-height: 64px;
      border: 1px dashed var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background: #fbfdff;
    }

    .submit-dialog {
      width: min(1500px, calc(100vw - 40px));
      height: min(920px, calc(100vh - 48px));
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .submit-body {
      flex: 1;
      min-height: 0;
      padding: 14px 16px;
      background: var(--fill-light);
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .submit-summary {
      color: var(--text-regular);
      font-size: 13px;
    }

    .submit-table-wrap {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      background: #fff;
      overflow: auto;
    }

    .submit-table {
      min-width: 1120px;
    }

    .submit-old-value {
      color: var(--text-secondary);
    }

    .submit-new-value {
      color: #529b2e;
      font-weight: 600;
    }

    .submit-tabs {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: flex-end;
      gap: 0;
    }

    .submit-tab {
      min-width: 112px;
      height: 38px;
      padding: 0 14px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-regular);
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .submit-tab:hover {
      color: var(--el-blue);
    }

    .submit-tab.is-active {
      color: var(--el-blue);
      border-bottom-color: var(--el-blue);
    }

    .submit-tab-count {
      margin-left: 4px;
      font-weight: 400;
    }

    .submit-tab-icon {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .submit-tab.is-change {
      color: var(--el-blue);
    }

    .submit-tab.is-change.is-active {
      border-bottom-color: var(--el-blue);
    }

    .submit-tab.is-add {
      color: var(--el-green);
    }

    .submit-tab.is-add.is-active {
      border-bottom-color: var(--el-green);
    }

    .submit-tab.is-delete {
      color: var(--el-red);
    }

    .submit-tab.is-delete.is-active {
      border-bottom-color: var(--el-red);
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      z-index: 80;
      display: none;
      transform: translateX(-50%);
      min-width: 220px;
      max-width: 520px;
      min-height: 38px;
      padding: 9px 14px;
      border: 1px solid #e1f3d8;
      border-radius: 4px;
      background: #f0f9eb;
      color: #529b2e;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .12);
    }

    .toast.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="page-header">
      <div class="title-wrap">
        <h1 class="page-title">商品字段渠道批量维护</h1>
        <div class="header-meta">
          <span class="meta-tag">批量编辑</span>
          <span class="meta-tag">渠道字段</span>
        </div>
      </div>
    </section>

    <section class="filter-panel">
      <div class="filter-top">
        <div class="panel-title">维度选择</div>
        <div class="query-actions">
          <button class="el-button small" type="button" data-action="resetAll">重置</button>
          <button class="el-button primary small" type="button" data-action="query">查询</button>
        </div>
      </div>

      <div class="dimension-row" data-dimension-row="products">
        <div class="dimension-label"><span class="required-dot">*</span>商品选择</div>
        <div class="tag-box" id="productsTags" data-open="products"></div>
        <div class="dimension-actions">
          <span class="count-text" id="productsCount"></span>
        </div>
      </div>

      <div class="dimension-row" data-dimension-row="fields">
        <div class="dimension-label"><span class="required-dot">*</span>字段选择</div>
        <div class="tag-box" id="fieldsTags" data-open="fields"></div>
        <div class="dimension-actions">
          <span class="count-text" id="fieldsCount"></span>
        </div>
      </div>

      <div class="dimension-row" data-dimension-row="channels">
        <div class="dimension-label">
          <div class="dimension-mode-select" id="channelModeSelect">
            <button class="dimension-mode-trigger" type="button" data-channel-mode-toggle>渠道选择</button>
            <div class="dimension-mode-menu">
              <div class="dimension-mode-option is-active" data-channel-mode-option="include">渠道选择</div>
              <div class="dimension-mode-option" data-channel-mode-option="exclude">渠道过滤</div>
            </div>
          </div>
        </div>
        <div class="tag-box" id="channelsTags" data-open="channels"></div>
        <div class="dimension-actions">
          <span class="count-text" id="channelsCount"></span>
        </div>
      </div>
    </section>

    <section class="table-panel">
      <div class="table-toolbar">
        <div class="table-summary">
          <span class="summary-pill is-total">共 <span class="summary-number" id="totalCount">0</span> 条</span>
          <span class="summary-pill is-change">已修改 <span class="summary-number" id="changedCount">0</span> 条</span>
          <span class="summary-pill is-add">已新增 <span class="summary-number" id="addedCount">0</span> 条</span>
          <span class="summary-pill is-delete">已删除 <span class="summary-number" id="deletedCount">0</span> 条</span>
        </div>
        <div class="query-actions">
          <label class="search-inline">
            <span class="search-icon">⌕</span>
            <input id="tableKeyword" type="text" placeholder="搜索商品、字段、渠道">
            <button class="search-clear" id="tableKeywordClear" type="button" data-action="clearTableKeyword" aria-label="清空搜索" data-tooltip="清空">×</button>
          </label>
          <button class="el-button success plain small" type="button" data-action="batchAdd">批量新增</button>
          <button class="el-button info plain small" type="button" data-action="batchEdit">批量修改</button>
          <button class="el-button danger plain small" type="button" data-action="batchDelete" disabled>批量删除</button>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <div class="empty-state" id="emptyState">暂无数据</div>
        <table id="resultTable" style="display:none;">
          <thead>
            <tr>
              <th class="select-col"><input id="selectAllRows" type="checkbox" aria-label="全选"></th>
              <th style="width: 150px;">商品库</th>
              <th style="width: 170px;">商品模板</th>
              <th style="width: 220px;">商品</th>
              <th style="width: 150px;">字段</th>
              <th style="width: 90px;">字段类型</th>
              <th style="width: 115px;">渠道</th>
              <th style="width: 215px;">当前值</th>
              <th style="width: 230px;">修改值</th>
              <th class="action-col" style="width: 100px;">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="fixed-footer">
    <div class="footer-info" id="footerInfo">请选择维度后查询</div>
    <div class="footer-actions">
      <button class="el-button" type="button" data-action="cancel">取消</button>
      <button class="el-button primary" type="button" data-action="save">保存</button>
    </div>
  </div>

  <div class="dialog-mask" id="selectorDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="dialog-header">
        <div class="dialog-title" id="dialogTitle">选择</div>
        <button class="dialog-close" type="button" data-dialog="close" aria-label="关闭">×</button>
      </div>
      <div class="dialog-body">
        <div class="field-template-bar" id="fieldTemplateBar">
          <span class="template-label">字段模板</span>
          <button class="template-button" type="button" data-field-template="addChannel">新增渠道</button>
          <button class="template-button" type="button" data-field-template="changePrice">批量改价</button>
          <button class="template-button" type="button" data-field-template="changeStatus">批量上下架</button>
        </div>
        <section class="transfer-panel">
          <div class="transfer-filter-line">
            <div class="transfer-search-type" id="sourceProductSearchType">
              <button class="search-type-button" type="button" data-search-type-toggle="source">
                <span data-search-type-label="source">商品ID</span>
                <span class="search-type-arrow">⌃</span>
              </button>
              <div class="search-type-popover">
                <div class="search-type-option is-active" data-search-type-option="source" data-value="productId">商品ID</div>
                <div class="search-type-option" data-search-type-option="source" data-value="productName">商品名称</div>
                <div class="search-type-option" data-search-type-option="source" data-value="libraryId">商品库ID</div>
                <div class="search-type-option" data-search-type-option="source" data-value="libraryName">商品库名称</div>
                <div class="search-type-option" data-search-type-option="source" data-value="templateId">模板ID</div>
                <div class="search-type-option" data-search-type-option="source" data-value="templateName">模板名称</div>
              </div>
            </div>
            <label class="transfer-search">
              <span>⌕</span>
              <input id="selectorKeyword" type="text" placeholder="输入名称或编码">
            </label>
            <div class="transfer-group-filter" id="sourceGroupFilter">
              <button class="group-filter-button" type="button" data-group-filter-toggle="source">
                <span class="group-filter-icon">☷</span>
                <span>分组</span>
              </button>
              <div class="group-filter-popover">

    var gameLibraries = [
      { id: "cache_lib_1001", name: "Steam 游戏库" },

      { id: "tpl_2004", name: "会员订阅模板" }
    ];

    function flatten(dimensionKey) {
      var list = [];
      dimensions[dimensionKey].groups.forEach(function(group) {
        group.items.forEach(function(item) {
          list.push({ id: item[0], name: item[1], group: group.name });
        });
      });
      return list;
    }

    function getItem(dimensionKey, id) {
      return flatten(dimensionKey).filter(function(item) {
        return item.id === id;
      })[0];
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderTags(dimensionKey) {
      var box = document.getElementById(dimensionKey + "Tags");
      var count = document.getElementById(dimensionKey + "Count");
      var selected = state.selected[dimensionKey];
      count.textContent = dimensionKey === "channels" && state.channelMode === "exclude" ? "过滤 " + selected.length + " 项" : selected.length + " 项";
      box.classList.toggle("is-empty", selected.length === 0);
      if (!selected.length) {
        box.innerHTML = '<span class="placeholder">' + dimensions[dimensionKey].placeholder + '</span>';
        return;
      }
      box.innerHTML = selected.map(function(id) {
        var item = getItem(dimensionKey, id);
        var dangerClass = dimensionKey === "channels" && state.channelMode === "exclude" ? " is-danger" : "";
        var title = dimensionKey === "channels" && state.channelMode === "exclude" ? "过滤：" + item.name : item.name;
        return '<span class="el-tag' + dangerClass + '" title="' + escapeHtml(title) + '">' +
          escapeHtml(item.name) +
          '<button class="tag-close" type="button" data-remove-tag="' + dimensionKey + '" data-id="' + id + '">×</button>' +
          '</span>';
      }).join("");
    }

    function renderAllTags() {
      renderTags("products");
      renderTags("channels");
      renderTags("fields");
      syncChannelModeSelect();
    }

    function syncChannelModeSelect() {
      var select = document.getElementById("channelModeSelect");
      if (!select) return;
      var label = state.channelMode === "exclude" ? "渠道过滤" : "渠道选择";
      var trigger = select.querySelector("[data-channel-mode-toggle]");
      if (trigger) trigger.textContent = label;
      Array.from(select.querySelectorAll("[data-channel-mode-option]")).forEach(function(option) {
        option.classList.toggle("is-active", option.getAttribute("data-channel-mode-option") === state.channelMode);
      });
    }

    var bodyScrollTop = 0;

    function lockBodyScroll() {
      if (document.body.classList.contains("is-dialog-open")) return;
      bodyScrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
      document.body.style.top = "-" + bodyScrollTop + "px";
      document.body.classList.add("is-dialog-open");
    }

    function unlockBodyScroll() {
      if (document.querySelector(".dialog-mask.is-visible")) return;
      document.body.classList.remove("is-dialog-open");
      document.body.style.top = "";
      window.scrollTo(0, bodyScrollTop);
    }

    function openDialog(dimensionKey, scope) {
      state.selectorScope = scope || "main";
      state.activeDimension = dimensionKey;
      var source = state.selectorScope === "batch" ? state.batchSelected : state.selected;
      state.draftSelection = source[dimensionKey].slice();
      state.sourceChecked = [];
      state.selectedChecked = [];
      state.sourceGroupFilters = [];
      state.selectedGroupFilters = [];
      state.sourceProductSearchType = "productId";
      state.selectedProductSearchType = "productId";
      document.getElementById("dialogTitle").textContent = dimensions[dimensionKey].title;
      document.getElementById("selectorKeyword").value = "";
      document.getElementById("selectedKeyword").value = "";
      closeGroupFilterPopovers();
      document.getElementById("selectorDialog").classList.add("is-visible");
      document.getElementById("selectorDialog").setAttribute("aria-hidden", "false");
      lockBodyScroll();
      renderDialog();
    }

    function closeDialog() {
      document.getElementById("selectorDialog").classList.remove("is-visible");
      document.getElementById("selectorDialog").setAttribute("aria-hidden", "true");
      state.activeDimension = null;
      state.selectorScope = "main";
      unlockBodyScroll();
    }

    function productMetaData(productId) {
      var match = String(productId || "").match(/(\d+)$/);
      var index = match ? Math.max(0, Number(match[1]) - 1) : 0;
      return {
        library: gameLibraries[index % gameLibraries.length],
        template: templates[index % templates.length]
      };
    }

    function productMetaText(productId) {
      var meta = productMetaData(productId);
      var library = meta.library;
      var template = meta.template;
      return formatIdName(library.id, library.name) + "；" + formatIdName(template.id, template.name);
    }

    function productSearchText(item, type) {
      var meta = productMetaData(item.id);
      if (type === "productName") return item.name;
      if (type === "libraryId") return meta.library.id;
      if (type === "libraryName") return meta.library.name;
      if (type === "templateId") return meta.template.id;
      if (type === "templateName") return meta.template.name;
      return item.id;
    }

    function renderFlatRow(item, key, checkAttr, checked) {
      var rightText = key === "channels" ? item.group : item.id;
      var productDesc = key === "products" ? '<span class="product-row-desc">' + escapeHtml(productMetaText(item.id)) + '</span>' : '';
      return '<label class="field-row' + (key === "products" ? ' is-product' : '') + '">' +
        '<input type="checkbox" ' + checkAttr + '="' + item.id + '" ' + checked + '>' +
        '<span class="field-row-name">' + escapeHtml(item.name) + '</span>' +
        '<span class="field-row-key">' + escapeHtml(rightText) + '</span>' +
        productDesc +
        '</label>';
    }

    function channelGroupNames() {
      return dimensions.channels.groups.map(function(group) {
        return group.name;
      });
    }

    function closeGroupFilterPopovers(except) {
      Array.from(document.querySelectorAll(".transfer-group-filter")).forEach(function(node) {
        if (!except || node.id !== except + "GroupFilter") {
          node.classList.remove("is-open");
        }
      });
    }

    function closeSearchTypePopovers(except) {
      Array.from(document.querySelectorAll(".transfer-search-type")).forEach(function(node) {
        if (!except || node.id !== except + "ProductSearchType") {
          node.classList.remove("is-open");
        }
      });
    }

    function closeBatchChannelSelects(exceptKey) {
      Array.from(document.querySelectorAll(".batch-channel-select")).forEach(function(node) {
        if (!exceptKey || node.getAttribute("data-channel-select") !== exceptKey) {
          node.classList.remove("is-open");
          node.classList.remove("is-floating");
        }
      });
    }

    function syncGroupFilterControls(key) {
      var visible = key === "channels";
      ["source", "selected"].forEach(function(scope) {
        var container = document.getElementById(scope + "GroupFilter");
        if (!container) return;
        container.classList.toggle("is-visible", visible);
        if (!visible) {
          container.classList.remove("is-open");
          return;
        }
        var activeGroups = scope === "source" ? state.sourceGroupFilters : state.selectedGroupFilters;
        Array.from(container.querySelectorAll("[data-group-filter-check]")).forEach(function(input) {
          input.checked = activeGroups.indexOf(input.value) > -1;
        });
        var label = container.querySelector(".group-filter-button span:last-child");
        label.textContent = activeGroups.length ? "分组 " + activeGroups.length : "分组";

        templateId: "模板ID",

    function syncProductSearchTypeControls(key) {

        }

        });
      });

      selectedInput.placeholder = visible ? "请输入查询值" : "搜索已选名称或编码";
    }

    function syncTransferCheckHeader(type, visibleIds, checkedIds) {
      var checkbox = document.getElementById(type + "CheckAll");
      var count = document.getElementById(type + "CheckCount");
      var checkedVisible = visibleIds.filter(function(id) {
        return checkedIds.indexOf(id) > -1;
      }).length;
      checkbox.checked = visibleIds.length > 0 && checkedVisible === visibleIds.length;
      checkbox.indeterminate = checkedVisible > 0 && checkedVisible < visibleIds.length;
      checkbox.disabled = visibleIds.length === 0;
      count.textContent = checkedVisible + "/" + visibleIds.length;

    function renderFlatDimensionDialog(key, keyword, selectedKeyword, sourceList, selectedList) {
      var sourceItems = flatten(key).filter(function(item) {
        var text = key === "products"
          ? productSearchText(item, state.sourceProductSearchType).toLowerCase()
          : (item.id + " " + item.name + " " + item.group).toLowerCase();
        if (state.draftSelection.indexOf(item.id) > -1) return false;
        if (key === "channels" && state.sourceGroupFilters.length && state.sourceGroupFilters.indexOf(item.group) === -1) return false;
        return !keyword || text.indexOf(keyword) > -1;
      });
      sourceList.className = "transfer-list field-flat-list";
      selectedList.className = "selected-list field-selected-list";
      sourceList.innerHTML = sourceItems.map(function(item) {
        var checked = state.sourceChecked.indexOf(item.id) > -1 ? "checked" : "";
        return renderFlatRow(item, key, "data-source-check", checked);
      }).join("") || '<div class="empty-state">暂无匹配项</div>';
      var selectedIds = state.draftSelection.filter(function(id) {
        var item = getItem(key, id);
        var text = item
          ? (key === "products" ? productSearchText(item, state.selectedProductSearchType).toLowerCase() : (item.id + " " + item.name + " " + item.group).toLowerCase())
          : "";
        if (key === "channels" && item && state.selectedGroupFilters.length && state.selectedGroupFilters.indexOf(item.group) === -1) return false;
        return !selectedKeyword || text.indexOf(selectedKeyword) > -1;
      });
      selectedList.innerHTML = selectedIds.map(function(id) {
        var item = getItem(key, id);
        var checked = state.selectedChecked.indexOf(id) > -1 ? "checked" : "";
        return renderFlatRow(item, key, "data-selected-check", checked);
      }).join("") || '<span class="placeholder">' + (state.draftSelection.length ? '暂无匹配已选项' : '暂无已选项') + '</span>';
      syncTransferCheckHeader("source", sourceItems.map(function(item) { return item.id; }), state.sourceChecked);

    function renderDialog() {
      var key = state.activeDimension;
      if (!key) return;
      var keyword = document.getElementById("selectorKeyword").value.trim().toLowerCase();
      var selectedKeyword = document.getElementById("selectedKeyword").value.trim().toLowerCase();
      var sourceList = document.getElementById("sourceList");
      var selectedList = document.getElementById("selectedList");
      var templateBar = document.getElementById("fieldTemplateBar");
      if (templateBar) {
        templateBar.classList.toggle("is-visible", key === "fields");
      }
      syncGroupFilterControls(key);
      syncProductSearchTypeControls(key);
      var visibleCount = 0;

      if (key === "fields" || key === "channels" || key === "products") {
        renderFlatDimensionDialog(key, keyword, selectedKeyword, sourceList, selectedList);

      sourceList.className = "transfer-list";
      selectedList.className = "selected-list";

      var sourceHtml = dimensions[key].groups.map(function(group) {

            '<span class="tree-text">' +
            '<span class="tree-name">' + escapeHtml(item[1]) + (active ? ' <span class="el-tag is-success">已选</span>' : '') + '</span>' +
            '<span class="tree-code">' + escapeHtml(item[0]) + '</span>' +
            '</span>' +
            '</label>';
        }).join("");
        if (!rows) return "";
        return '<div class="tree-group"><div class="tree-group-title">' + escapeHtml(group.name) + '</div>' + rows + '</div>';
      }).join("");

      sourceList.innerHTML = sourceHtml || '<div class="empty-state">暂无匹配项</div>';

      var selectedIds = state.draftSelection.filter(function(id) {
        var item = getItem(key, id);
        var text = item ? (item.id + " " + item.name).toLowerCase() : "";
        return !selectedKeyword || text.indexOf(selectedKeyword) > -1;
      });
      selectedList.innerHTML = selectedIds.map(function(id) {
        var item = getItem(key, id);
        var checked = state.selectedChecked.indexOf(id) > -1 ? "checked" : "";
        return '<label class="el-tag" title="' + escapeHtml(item.name) + '">' +
          '<input type="checkbox" data-selected-check="' + id + '" ' + checked + '>' +
          escapeHtml(item.name) +
          '</label>';
      }).join("") || '<span class="placeholder">' + (state.draftSelection.length ? '暂无匹配已选项' : '暂无已选项') + '</span>';

    function addDraftSelection(ids) {
      ids.forEach(function(id) {
        if (state.draftSelection.indexOf(id) === -1) {
          state.draftSelection.push(id);
        }
      });
      state.sourceChecked = [];
      renderDialog();
    }

    function removeDraftSelection(ids) {
      state.draftSelection = state.draftSelection.filter(function(id) {
        return ids.indexOf(id) === -1;
      });
      state.selectedChecked = [];
      renderDialog();
    }

    function currentValue(row) {
      var fieldId = row.fieldId;
      if (fieldId === "field_status") return row.index % 4 === 0 ? "下架" : "上架";
      if (fieldId === "field_release_time") return "2026-07-" + String(10 + row.index % 18).padStart(2, "0") + "T10:00:00";
      if (fieldId === "field_price") return (39 + row.index * 3.7).toFixed(2);
      if (fieldId === "field_stock") return 120 + row.index * 8;
      if (fieldId === "field_sort") return 1000 + row.index;
      if (fieldId === "field_limit") return row.index % 3 === 0 ? 1 : 2;
      if (fieldId === "field_delivery") return row.index % 2 === 0 ? "自动发货" : "卡密发货";
      if (fieldId === "field_platforms") return row.index % 2 === 0 ? "PC, PlayStation" : "PC, Xbox";
      if (fieldId === "field_desc") return "支持自动兑换，到账时间约 1-5 分钟。";
      if (fieldId === "field_cover") return "cover_" + row.product.id + ".png";
      if (fieldId === "field_gallery") return "banner_1.png, banner_2.png";
      if (fieldId === "field_region") return "CN, HK, SG";
      if (fieldId === "field_risk") return row.index % 3 === 0 ? "中" : "低";
      if (fieldId === "field_verify") return row.index % 2 === 0 ? "开启" : "关闭";
      if (fieldId === "field_tag") return "热销, 限时";
      return row.product.name + " - " + row.channel.name;
    }

    function createRow(product, channel, field, index, isNew, initialModifyValue) {
      var row = {
        id: product.id + "_" + channel.id + "_" + field.id,
        index: index,
        gameLibrary: gameLibraries[index % gameLibraries.length],
        template: templates[index % templates.length],
        product: product,
        channel: channel,
        fieldId: field.id,
        field: field.name,
        fieldType: (fieldMeta[field.id] || {}).type || "文本",
        modifyValue: "",
        changed: false,
        selected: false,
        inlineEditing: false,
        isNew: !!isNew,
        isDeleted: false
      };
      row.currentValue = row.isNew ? "" : currentValue(row);
      row.modifyValue = row.isNew ? (initialModifyValue || "") : row.currentValue;
      return row;
    }

    function buildRows() {
      var rows = [];
      var products = state.selected.products.map(function(id) { return getItem("products", id); }).filter(Boolean);
      var allChannels = flatten("channels");
      var channels = state.channelMode === "exclude"
        ? allChannels.filter(function(channel) { return state.selected.channels.indexOf(channel.id) < 0; })
        : (state.selected.channels.length ? state.selected.channels.map(function(id) { return getItem("channels", id); }) : allChannels);
      channels = channels.filter(Boolean);
      var fields = state.selected.fields.map(function(id) { return getItem("fields", id); }).filter(Boolean);
      var maxRows = Math.min(36, Math.max(0, products.length * channels.length * fields.length));
      var index = 0;

      products.forEach(function(product) {
        channels.forEach(function(channel) {
          fields.forEach(function(field) {
            if (index >= maxRows) return;
            rows.push(createRow(product, channel, field, index, false));
            index += 1;
          });
        });
      });
      state.rows = rows;
      state.selectedRows = [];
      renderTable();
    }

    function rowChanged(row) {
      if (row.isDeleted || row.isNew) return false;
      return String(row.modifyValue == null ? "" : row.modifyValue) !== String(row.currentValue == null ? "" : row.currentValue);
    }

    function rowAdded(row) {
      return !!row.isNew && !row.isDeleted;
    }

    function rowDeleted(row) {
      return !!row.isDeleted;
    }

    function renderInlineSelectControl(row, meta, multiple) {
      var values = multiple
        ? String(row.modifyValue || "").split(",").map(function(item) { return item.trim(); }).filter(Boolean)
        : [String(row.modifyValue || "")];
      var label = multiple ? (values.length ? values.join(", ") : "请选择") : (values[0] || "请选择");
      return '<div class="inline-el-control inline-select-control ' + (multiple ? 'is-multiple' : 'is-select') + '" data-inline-select="' + row.id + '">' +
        '<button class="inline-select-trigger" type="button" data-inline-select-toggle="' + row.id + '">' +
        '<span class="inline-select-label">' + escapeHtml(label) + '</span>' +
        '<span class="inline-select-arrow">⌄</span>' +
        '</button>' +
        '<div class="inline-select-dropdown">' +
        meta.options.map(function(option) {
          var active = values.indexOf(option) > -1;
          return '<div class="inline-select-option' + (active ? ' is-active' : '') + '" data-inline-select-option="' + row.id + '" data-value="' + escapeHtml(option) + '" data-multiple="' + (multiple ? 'true' : 'false') + '">' +
            (multiple ? '<span class="inline-select-check"></span>' : '') +
            '<span>' + escapeHtml(option) + '</span>' +
            '</div>';
        }).join("") +
        '</div>' +
        '</div>';
    }

    function parseInlineDate(value) {
      var normalized = normalizeInlineDate(value || "");
      var match = normalized.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (match) {
        return {
          year: Number(match[1]),
          month: Number(match[2]),
          day: Number(match[3]),
          value: normalized
        };
      }
      return { year: 2026, month: 7, day: 3, value: "2026-07-03" };
    }

    function inlineDateValue(date) {
      return date.getFullYear() + "-" + padTimeUnit(date.getMonth() + 1) + "-" + padTimeUnit(date.getDate());
    }

    function buildInlineCalendarHtml(rowId, dateValue) {
      var selected = parseInlineDate(dateValue);
      var firstDay = new Date(selected.year, selected.month - 1, 1).getDay();
      var today = inlineDateValue(new Date());
      var cells = [];
      for (var i = 0; i < 42; i += 1) {
        var dayOffset = i - firstDay + 1;
        var cellDate = new Date(selected.year, selected.month - 1, dayOffset);
        var cellValue = inlineDateValue(cellDate);
        var muted = cellDate.getMonth() !== selected.month - 1;
        var active = cellValue === selected.value;
        var isToday = cellValue === today;
        cells.push(
          '<button class="inline-time-day' + (muted ? ' is-muted' : '') + (active ? ' is-active' : '') + (isToday ? ' is-today' : '') + '" type="button" data-inline-time-day="' + rowId + '" data-value="' + cellValue + '">' +
          cellDate.getDate() +
          '</button>'
        );
      }
      return '<div class="inline-time-calendar-head">' +
        '<button type="button" data-inline-time-month="' + rowId + '" data-offset="-12">«</button>' +
        '<button type="button" data-inline-time-month="' + rowId + '" data-offset="-1">‹</button>' +
        '<strong>' + selected.year + ' 年 ' + selected.month + ' 月</strong>' +
        '<button type="button" data-inline-time-month="' + rowId + '" data-offset="1">›</button>' +
        '<button type="button" data-inline-time-month="' + rowId + '" data-offset="12">»</button>' +
        '</div>' +
        '<div class="inline-time-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>' +
        '<div class="inline-time-days">' + cells.join("") + '</div>';
    }

    function refreshInlineTimeCalendar(rowId, dateValue) {
      var timeControl = document.querySelector('[data-inline-time="' + rowId + '"]');
      var calendar = timeControl && timeControl.querySelector(".inline-time-calendar");
      if (calendar) {
        calendar.innerHTML = buildInlineCalendarHtml(rowId, dateValue);
      }
    }

    function renderInlineTimeControl(row) {
      var normalized = displayValue(row.modifyValue || "");
      var dateValue = normalized.slice(0, 10) || "2026-07-11";
      var timeValue = normalized.length >= 19 ? normalized.slice(11, 19) : (normalized.length >= 16 ? normalized.slice(11, 16) + ":00" : "10:00:00");
      return '<div class="inline-el-control inline-time-control is-time" data-inline-time="' + row.id + '">' +
        '<input class="value-input el-input__inner" data-row-edit="' + row.id + '" data-inline-time-input="' + row.id + '" type="text" value="' + escapeHtml(normalized) + '" placeholder="YYYY-MM-DD HH:mm:ss">' +
        '<button class="inline-time-button" type="button" data-inline-time-toggle="' + row.id + '" aria-label="选择时间">◷</button>' +
        '<div class="inline-time-panel">' +
        '<div class="inline-time-body">' +
        '<div class="inline-time-fields">' +
        '<input type="text" inputmode="numeric" data-inline-time-date="' + row.id + '" value="' + escapeHtml(dateValue) + '" placeholder="选择日期">' +
        '<input type="text" inputmode="numeric" data-inline-time-clock="' + row.id + '" value="' + escapeHtml(timeValue) + '" placeholder="选择时间">' +
        '</div>' +
        '<div class="inline-time-calendar">' + buildInlineCalendarHtml(row.id, dateValue) + '</div>' +
        '</div>' +
        '<div class="inline-time-footer">' +
        '<button class="inline-time-now" type="button" data-inline-time-now="' + row.id + '">此刻</button>' +
        '<button class="inline-time-confirm is-primary" type="button" data-inline-time-confirm="' + row.id + '">确定</button>' +
        '</div>' +
        '</div>' +
        '</div>';
    }

    function closeInlineSelects(exceptId) {
      Array.from(document.querySelectorAll(".inline-select-control")).forEach(function(node) {
        if (!exceptId || node.getAttribute("data-inline-select") !== exceptId) {

          node.classList.remove("is-open");

      });

    function closeBatchTimePickers(exceptId) {
      Array.from(document.querySelectorAll(".batch-time-control")).forEach(function(node) {
        if (!exceptId || node.getAttribute("data-batch-time") !== exceptId) {
          node.classList.remove("is-open");
          node.classList.remove("is-floating");
        }
      });
    }

    function positionFloatingPanel(control, panelSelector, preferredWidth) {
      if (!control) return;
      var rect = control.getBoundingClientRect();
      var panel = control.querySelector(panelSelector);
      var width = Math.max(preferredWidth || rect.width, rect.width);
      var left = Math.min(Math.max(8, rect.left), window.innerWidth - width - 8);
      var top = rect.bottom + 4;
      if (panel) {
        var panelHeight = panel.offsetHeight || 320;
        if (top + panelHeight > window.innerHeight - 12) {
          top = Math.max(8, rect.top - panelHeight - 4);
        }
      }
      control.style.setProperty("--floating-left", left + "px");
      control.style.setProperty("--floating-top", top + "px");
      control.style.setProperty("--floating-width", width + "px");
      control.classList.add("is-floating");
    }

    function closeChannelModeSelect() {
      var select = document.getElementById("channelModeSelect");
      if (select) select.classList.remove("is-open");
    }

    function padTimeUnit(value) {
      value = String(value == null ? "" : value).replace(/\D/g, "");
      return value.length === 1 ? "0" + value : value.slice(0, 2);
    }

    function normalizeInlineDate(value) {
      var text = String(value || "").trim().replace(/[./]/g, "-");
      var match = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (!match) return text;
      return match[1] + "-" + padTimeUnit(match[2]) + "-" + padTimeUnit(match[3]);
    }

    function normalizeInlineClock(value) {
      var text = String(value || "").trim();
      var match = text.match(/^(\d{1,2})(?::?(\d{1,2}))?(?::?(\d{1,2}))?$/);
      if (!match) return text;
      return padTimeUnit(match[1]) + ":" + padTimeUnit(match[2] || "00") + ":" + padTimeUnit(match[3] || "00");
    }

    function updateInlineTimeValue(rowId, shouldNormalize) {
      var timeRow = findRow(rowId);
      var timeControl = document.querySelector('[data-inline-time="' + rowId + '"]');
      if (!timeRow || !timeControl) return;
      var dateInput = timeControl.querySelector('[data-inline-time-date]');
      var clockInput = timeControl.querySelector('[data-inline-time-clock]');
      var textInput = timeControl.querySelector('[data-row-edit]');
      var dateValue = dateInput ? dateInput.value : "";
      var clockValue = clockInput ? clockInput.value : "";
      if (shouldNormalize) {
        dateValue = normalizeInlineDate(dateValue);
        clockValue = normalizeInlineClock(clockValue);
        if (dateInput) dateInput.value = dateValue;
        if (clockInput) clockInput.value = clockValue;
      }
      var value = (dateValue || "") + (dateValue || clockValue ? " " : "") + (clockValue || "");
      if (textInput) textInput.value = value;
      setRowModifyValue(timeRow, value);
      var timeTr = timeControl.closest("tr");
      if (timeTr) timeTr.classList.toggle("is-dirty", rowChanged(timeRow));
      refreshSummaryOnly();
    }

    function refreshBatchTimeCalendar(key, dateValue) {
      var timeControl = document.querySelector('[data-batch-time="' + key + '"]');
      var calendar = timeControl && timeControl.querySelector(".inline-time-calendar");
      if (calendar) {
        calendar.innerHTML = buildBatchCalendarHtml(key, dateValue);
      }
    }

    function updateBatchTimeValue(key, shouldNormalize) {
      var timeControl = document.querySelector('[data-batch-time="' + key + '"]');
      if (!timeControl) return;
      var dateInput = timeControl.querySelector('[data-batch-time-date]');
      var clockInput = timeControl.querySelector('[data-batch-time-clock]');
      var textInput = timeControl.querySelector('[data-batch-value]');
      var dateValue = dateInput ? dateInput.value : "";
      var clockValue = clockInput ? clockInput.value : "";
      if (shouldNormalize) {
        dateValue = normalizeInlineDate(dateValue);
        clockValue = normalizeInlineClock(clockValue);
        if (dateInput) dateInput.value = dateValue;
        if (clockInput) clockInput.value = clockValue;
      }
      if (textInput) textInput.value = (dateValue || "") + (dateValue || clockValue ? " " : "") + (clockValue || "");
    }

    function getCounts() {
      return {
        changed: state.rows.filter(rowChanged).length,
        added: state.rows.filter(rowAdded).length,
        deleted: state.rows.filter(rowDeleted).length
      };
    }

        '<span class="footer-metric">商品 <strong>' + state.selected.products.length + '</strong></span>' +
        '<span class="footer-metric">渠道 <strong>' + state.selected.channels.length + '</strong></span>' +
        '<span class="footer-metric">字段 <strong>' + state.selected.fields.length + '</strong></span>' +
        '<span class="footer-metric">勾选 <strong>' + state.selectedRows.length + '</strong></span>' +
        '<span class="footer-metric is-pending' + (pending ? '' : ' is-idle') + '">待提交 <strong>' + pending + '</strong> 条：修改 ' + counts.changed + ' / 新增 ' + counts.added + ' / 删除 ' + counts.deleted + '</span>';

      if (!button) return;
      button.disabled = pending === 0;
      button.textContent = pending ? "保存 " + pending : "保存";
      button.setAttribute("title", pending ? "提交本次变更" : "暂无需要提交的数据");
    }

      var button = document.getElementById("tableKeywordClear");
      if (button) {
        button.classList.toggle("is-visible", !!state.keyword);
      }
    }

    function renderEmptyState(empty, title, desc) {
      empty.innerHTML =
        '<div class="empty-state-title">' + escapeHtml(title) + '</div>' +
        '<div class="empty-state-desc">' + escapeHtml(desc) + '</div>';

    function formatIdName(id, name) {

    function setRowModifyValue(row, value) {
      row.modifyValue = value;
      row.changed = rowChanged(row);
    }

    function displayValue(value) {
      return String(value == null ? "" : value).replace("T", " ");
    }

    function renderValueEditor(row) {
      if (row.isDeleted) {
        return '<span class="cell-ellipsis" data-tooltip="-">-</span>';
      }
      var meta = fieldMeta[row.fieldId] || { kind: "text" };
      var value = row.modifyValue;
      if (meta.editMode === "dialog") {
        var dialogValue = displayValue(value) || "点击弹框编辑";
        return '<span class="editable-value" data-dialog-edit="' + row.id + '" data-tooltip="' + escapeHtml(dialogValue) + '">' + escapeHtml(dialogValue) + '</span>';
      }
      if (!row.inlineEditing) {
        var displayText = displayValue(value) || "点击编辑";
        var emptyClass = value ? "" : " is-empty";
        return '<span class="editable-value' + emptyClass + '" data-inline-edit="' + row.id + '" data-tooltip="' + escapeHtml(displayText) + '">' + escapeHtml(displayText) + '</span>';
      }
      if (meta.kind === "select") {
        return renderInlineSelectControl(row, meta, false);
      }
      if (meta.kind === "multiselect") {
        return renderInlineSelectControl(row, meta, true);
      }
      if (meta.kind === "time") {
        return renderInlineTimeControl(row);
      }
      if (meta.kind === "textarea" || meta.kind === "richtext") {
        return '<div class="inline-el-control is-textarea"><textarea class="value-textarea el-textarea__inner" data-row-edit="' + row.id + '" placeholder="请输入修改值">' + escapeHtml(value) + '</textarea></div>';
      }
      return '<div class="inline-el-control is-input"><input class="value-input el-input__inner" data-row-edit="' + row.id + '" type="' + (meta.kind === "number" ? "number" : "text") + '" value="' + escapeHtml(value) + '" placeholder="请输入修改值"></div>';
    }

    function filteredRows() {
      var keyword = state.keyword.trim().toLowerCase();
      if (!keyword) return state.rows;
      return state.rows.filter(function(row) {
        return [
          row.gameLibrary,
          row.template,
          row.product.name,
          row.field,
          row.channel.name,
          row.currentValue,
          row.modifyValue
        ].join(" ").toLowerCase().indexOf(keyword) > -1;
      });
    }

    function renderTable() {
      var rows = filteredRows();
      var table = document.getElementById("resultTable");
      var empty = document.getElementById("emptyState");
      var body = document.getElementById("tableBody");
      var counts = getCounts();
      state.selectedRows = state.rows.filter(function(row) { return row.selected; }).map(function(row) { return row.id; });

      document.getElementById("totalCount").textContent = rows.length;
      document.getElementById("changedCount").textContent = counts.changed;
      document.getElementById("addedCount").textContent = counts.added;
      document.getElementById("deletedCount").textContent = counts.deleted;
      renderFooterInfo(counts);
      syncBatchDeleteButton();

      if (!rows.length) {
        table.style.display = "none";
        empty.style.display = "flex";
        if (state.rows.length) {
          renderEmptyState(empty, "未找到匹配结果", "请调整搜索关键词，或重新选择商品、渠道、字段后查询");
        } else {
          renderEmptyState(empty, "暂无可维护字段", "请选择商品、渠道和字段后点击查询");
        }
        body.innerHTML = "";
        syncSelectAllState([]);
        return;
      }

      empty.style.display = "none";
      table.style.display = "";
      body.innerHTML = rows.map(function(row) {
        var libraryText = formatIdName(row.gameLibrary.id, row.gameLibrary.name);
        var templateText = formatIdName(row.template.id, row.template.name);
        var productText = formatIdName(row.product.id, row.product.name);
        var fieldText = formatIdName(row.fieldId, row.field);
        var rowClasses = [rowChanged(row) ? 'is-dirty' : '', rowAdded(row) ? 'is-new' : '', rowDeleted(row) ? 'is-deleted' : '', row.inlineEditing ? 'is-editing' : ''].filter(Boolean).join(' ');
        return '<tr class="' + rowClasses + '">' +
          '<td class="select-col"><input type="checkbox" data-row-select="' + row.id + '" ' + (row.selected ? 'checked' : '') + ' aria-label="选择行"></td>' +
          '<td><span class="cell-ellipsis" data-tooltip="' + escapeHtml(libraryText) + '">' + escapeHtml(libraryText) + '</span></td>' +
          '<td><span class="cell-ellipsis" data-tooltip="' + escapeHtml(templateText) + '">' + escapeHtml(templateText) + '</span></td>' +
          '<td><span class="cell-ellipsis" data-tooltip="' + escapeHtml(productText) + '">' + escapeHtml(productText) + '</span></td>' +
          '<td><span class="cell-ellipsis" data-tooltip="' + escapeHtml(fieldText) + '">' + escapeHtml(fieldText) + '</span></td>' +
          '<td><span class="field-type" data-tooltip="' + escapeHtml(row.fieldType) + '">' + escapeHtml(row.fieldType) + '</span></td>' +
          '<td><span class="el-tag is-info" data-tooltip="' + escapeHtml(formatIdName(row.channel.id, row.channel.name)) + '">' + escapeHtml(row.channel.name) + '</span></td>' +
          '<td><span class="cell-ellipsis" data-tooltip="' + escapeHtml(displayValue(row.currentValue) || '-') + '">' + escapeHtml(displayValue(row.currentValue) || '-') + '</span></td>' +
          '<td>' + renderValueEditor(row) + '</td>' +
          '<td class="action-col"><div class="table-actions">' +
          '<button class="op-icon is-reset" type="button" data-row-reset="' + row.id + '" data-tooltip="重置">' + actionIcons.reset + '</button>' +
          '<button class="op-icon is-delete" type="button" data-row-delete="' + row.id + '" data-tooltip="删除">' + actionIcons.delete + '</button>' +
          '</div></td>' +
          '</tr>';
      }).join("");
      syncSelectAllState(rows);
    }

    var actionIcons = {
      reset: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path></svg>',
      delete: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>'
    };

    function syncBatchDeleteButton() {
      var button = document.querySelector('[data-action="batchDelete"]');
      if (button) {
        button.disabled = !state.selectedRows.length;
      }
    }

    function syncSelectAllState(rows) {
      var checkbox = document.getElementById("selectAllRows");
      if (!checkbox) return;
      checkbox.checked = !!rows.length && rows.every(function(row) { return row.selected; });
      checkbox.indeterminate = rows.some(function(row) { return row.selected; }) && !checkbox.checked;
    }

    function refreshSummaryOnly() {
      var counts = getCounts();
      state.selectedRows = state.rows.filter(function(row) { return row.selected; }).map(function(row) { return row.id; });
      document.getElementById("changedCount").textContent = counts.changed;
      document.getElementById("addedCount").textContent = counts.added;
      document.getElementById("deletedCount").textContent = counts.deleted;
      renderFooterInfo(counts);
      syncBatchDeleteButton();
    }

    function findRow(rowId) {
      return state.rows.filter(function(row) { return row.id === rowId; })[0];
    }

    function renderUploadFileList(fileNames) {
      if (!fileNames.length) {
        return '<li class="upload-empty">暂无文件</li>';
      }
      return fileNames.map(function(name, index) {
        return '<li class="upload-file-item">' +
          '<span class="upload-icon-mini"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg></span>' +
          '<span class="upload-file-name" title="' + escapeHtml(name) + '">' + escapeHtml(name) + '</span>' +
          '<button class="upload-file-remove" type="button" data-upload-remove="' + index + '">×</button>' +
          '</li>';
      }).join("");
    }

    function currentUploadFiles() {
      var control = document.getElementById("editValueControl");
      return String(control ? control.value : "").split(",").map(function(item) {
        return item.trim();
      }).filter(Boolean);
    }

    function syncUploadFileList(fileNames) {
      var control = document.getElementById("editValueControl");
      var list = document.getElementById("editUploadFileList");
      if (control) control.value = fileNames.join(", ");
      if (list) list.innerHTML = renderUploadFileList(fileNames);
    }

    function renderEditValueControl(row) {
      var meta = fieldMeta[row.fieldId] || { kind: "text" };
      var value = state.editDraft;
      if (meta.kind === "select") {
        return '<select class="value-select" id="editValueControl">' +
          meta.options.map(function(option) {
            var selected = String(value) === option ? "selected" : "";
            return '<option value="' + escapeHtml(option) + '" ' + selected + '>' + escapeHtml(option) + '</option>';
          }).join("") +
          '</select>';
      }
      if (meta.kind === "multiselect") {
        var selectedValues = String(value || "").split(",").map(function(item) { return item.trim(); }).filter(Boolean);
        return '<select class="value-select is-multiple" id="editValueControl" multiple>' +
          meta.options.map(function(option) {
            var selected = selectedValues.indexOf(option) > -1 ? "selected" : "";
            return '<option value="' + escapeHtml(option) + '" ' + selected + '>' + escapeHtml(option) + '</option>';
          }).join("") +
          '</select>';
      }
      if (meta.kind === "time") {
        return '<input class="value-input" id="editValueControl" type="datetime-local" value="' + escapeHtml(value) + '">';
      }
      if (meta.kind === "file" || meta.kind === "files") {
        var fileNames = String(value || "").split(",").map(function(item) { return item.trim(); }).filter(Boolean);
        return '<div class="upload-mock" data-upload-kind="' + meta.kind + '">' +
          '<div class="upload-dragger">' +
          '<span class="upload-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M17 8l-5-5-5 5"></path><path d="M12 3v12"></path></svg></span>' +
          '<div class="upload-title">将文件拖到此处，或 <em>点击上传</em></div>' +
          '<button class="upload-button" type="button" data-upload-pick="' + meta.kind + '">点击上传</button>' +
          '<div class="upload-tip">' + (meta.kind === "file" ? "只能上传 1 个文件，上传后会替换当前文件" : "支持批量上传，多个文件将按文件列表保存") + '</div>' +
          '</div>' +
          '<ul class="upload-file-list" id="editUploadFileList">' + renderUploadFileList(fileNames) + '</ul>' +
          '<div class="upload-hidden-value"><input class="value-input" id="editValueControl" value="' + escapeHtml(fileNames.join(", ")) + '" placeholder="上传文件后自动填充文件名"></div>' +
          '</div>';
      }
      if (meta.kind === "richtext") {
        return '<div class="richtext-toolbar"><span>B</span><span>I</span><span>链接</span><span>图片</span></div>' +
          '<textarea class="value-textarea richtext-editor" id="editValueControl">' + escapeHtml(value) + '</textarea>';
      }
      if (meta.kind === "textarea") {
        return '<textarea class="value-textarea" id="editValueControl">' + escapeHtml(value) + '</textarea>';
      }
      return '<input class="value-input" id="editValueControl" type="' + (meta.kind === "number" ? "number" : "text") + '" value="' + escapeHtml(value) + '">';
    }

    function openEditDialog(rowId) {
      var row = findRow(rowId);
      if (!row) return;
      if (row.isDeleted) {
        showToast("删除行不可编辑");
        return;
      }
      state.editRowId = rowId;
      state.editDraft = row.modifyValue;
      var grid = document.getElementById("editFormGrid");
      grid.innerHTML =
        '<div class="edit-field is-wide">' + renderEditValueControl(row) + '</div>';
      document.getElementById("editDialog").classList.add("is-visible");
      document.getElementById("editDialog").setAttribute("aria-hidden", "false");
      lockBodyScroll();
    }

    function closeEditDialog() {
      document.getElementById("editDialog").classList.remove("is-visible");
      document.getElementById("editDialog").setAttribute("aria-hidden", "true");
      state.editRowId = "";
      state.editDraft = "";
      state.batchValueKey = "";
      unlockBodyScroll();
    }

    function confirmEditDialog() {
      var row = findRow(state.editRowId);
      var control = document.getElementById("editValueControl");
      if (control) {
        var value = control.multiple ? Array.from(control.selectedOptions).map(function(option) { return option.value; }).join(", ") : control.value;
        if (state.batchValueKey) {
          var hidden = document.querySelector('[data-batch-value="' + state.batchValueKey + '"]');
          var button = document.querySelector('[data-batch-value-dialog="' + state.batchValueKey + '"]');
          if (hidden) hidden.value = value;
          if (button) {
            button.textContent = displayValue(value) || '点击填写';
            button.setAttribute('title', displayValue(value) || '点击填写');
          }
          closeEditDialog();
          return;
        }
      }
      if (row && control) {
        setRowModifyValue(row, value);
        row.inlineEditing = false;
        renderTable();
      }
      closeEditDialog();
    }

    function renderBatchTags(dimensionKey) {
      var box = document.getElementById("batch" + dimensionKey + "Tags");
      var count = document.getElementById("batch" + dimensionKey + "Count");
      if (!box || !count) return;
      var selected = state.batchSelected[dimensionKey];
      count.textContent = selected.length + " 项";
      box.classList.toggle("is-empty", selected.length === 0);
      if (!selected.length) {
        box.innerHTML = '<span class="placeholder">' + dimensions[dimensionKey].placeholder + '</span>';
        return;
      }
      box.innerHTML = selected.map(function(id) {
        var item = getItem(dimensionKey, id);
        return '<span class="el-tag" title="' + escapeHtml(item.id + ' - ' + item.name) + '">' +
          escapeHtml(item.id + ' - ' + item.name) +
          '<button class="tag-close" type="button" data-remove-batch-tag="' + dimensionKey + '" data-id="' + id + '">×</button>' +
          '</span>';
      }).join("");
    }

    function renderBatchDimensions() {
      document.getElementById('batchDimensionGrid').innerHTML =
        '<div class="dimension-row">' +
        '<div class="dimension-label"><span class="required-dot">*</span>商品选择</div>' +
        '<div class="tag-box" id="batchproductsTags" data-batch-open="products"></div>' +
        '<div class="dimension-actions"><span class="count-text" id="batchproductsCount"></span></div>' +
        '</div>' +
        '<div class="dimension-row">' +
        '<div class="dimension-label"><span class="required-dot">*</span>字段选择</div>' +
        '<div class="tag-box" id="batchfieldsTags" data-batch-open="fields"></div>' +
        '<div class="dimension-actions"><span class="count-text" id="batchfieldsCount"></span></div>' +
        '</div>';
      renderBatchTags('products');
      renderBatchTags('fields');
    }

    function collectBatchSelection() {
      return {
        products: state.batchSelected.products.slice(),
        channels: state.batchSelected.channels.slice(),
        fields: state.batchSelected.fields.slice()
      };
    }

    function sampleValueForField(fieldId) {
      var row = state.rows.filter(function(item) { return item.fieldId === fieldId; })[0];
      if (row) return row.modifyValue;
      var meta = fieldMeta[fieldId] || {};
      return meta.options && meta.options.length ? meta.options[0] : '';
    }

    function batchValueKey(productId, fieldId) {
      return productId + "__" + fieldId;
    }

    function renderChannelSelect(key, channels) {
      var active = channels[0];
      return '<div class="batch-channel-select" data-channel-select="' + escapeHtml(key) + '">' +
        '<input class="batch-channel-hidden" type="hidden" data-batch-channel="' + escapeHtml(key) + '" value="' + escapeHtml(active.id) + '">' +
        '<button class="batch-channel-trigger" type="button" data-batch-channel-toggle="' + escapeHtml(key) + '">' +
        '<span class="batch-channel-label">' + escapeHtml(active.id + ' - ' + active.name) + '</span>' +
        '<span class="batch-channel-arrow">⌄</span>' +
        '</button>' +
        '<div class="batch-channel-dropdown">' +
        channels.map(function(channel, index) {
          return '<div class="batch-channel-option' + (index === 0 ? ' is-active' : '') + '" data-batch-channel-option="' + escapeHtml(key) + '" data-value="' + escapeHtml(channel.id) + '" data-label="' + escapeHtml(channel.id + ' - ' + channel.name) + '">' +
            '<span class="cell-ellipsis">' + escapeHtml(channel.id + ' - ' + channel.name) + '</span>' +
            '<span class="batch-channel-group">' + escapeHtml(channel.group) + '</span>' +
            '</div>';
        }).join('') +
        '</div>' +
        '</div>';
    }

    function renderBatchSelectControl(fieldId, key, meta, multiple, value) {
      var values = multiple
        ? String(value || "").split(",").map(function(item) { return item.trim(); }).filter(Boolean)
        : [String(value || "")];
      var label = multiple ? (values.length ? values.join(", ") : "请选择") : (values[0] || "请选择");
      return '<div class="inline-el-control inline-select-control batch-value-select ' + (multiple ? 'is-multiple' : 'is-select') + '" data-batch-select="' + escapeHtml(key) + '">' +
        '<input type="hidden" data-batch-value="' + escapeHtml(key) + '" data-batch-field="' + escapeHtml(fieldId) + '" value="' + escapeHtml(multiple ? values.join(", ") : values[0]) + '">' +
        '<button class="inline-select-trigger" type="button" data-batch-select-toggle="' + escapeHtml(key) + '">' +
        '<span class="inline-select-label">' + escapeHtml(label) + '</span>' +
        '<span class="inline-select-arrow">⌄</span>' +
        '</button>' +
        '<div class="inline-select-dropdown">' +
        meta.options.map(function(option) {
          var active = values.indexOf(option) > -1;
          return '<div class="inline-select-option' + (active ? ' is-active' : '') + '" data-batch-select-option="' + escapeHtml(key) + '" data-value="' + escapeHtml(option) + '" data-multiple="' + (multiple ? 'true' : 'false') + '">' +
            (multiple ? '<span class="inline-select-check"></span>' : '') +
            '<span>' + escapeHtml(option) + '</span>' +
            '</div>';
        }).join("") +
        '</div>' +
        '</div>';
    }

    function renderBatchTimeControl(fieldId, key, value) {
      var normalized = displayValue(value || "");
      var dateValue = normalized.slice(0, 10) || "2026-07-11";
      var timeValue = normalized.length >= 19 ? normalized.slice(11, 19) : (normalized.length >= 16 ? normalized.slice(11, 16) + ":00" : "10:00:00");
      return '<div class="inline-el-control inline-time-control batch-time-control is-time" data-batch-time="' + escapeHtml(key) + '">' +
        '<input class="value-input el-input__inner" data-batch-value="' + escapeHtml(key) + '" data-batch-field="' + escapeHtml(fieldId) + '" data-batch-time-input="' + escapeHtml(key) + '" type="text" value="' + escapeHtml(dateValue + ' ' + timeValue) + '" placeholder="YYYY-MM-DD HH:mm:ss">' +
        '<button class="inline-time-button" type="button" data-batch-time-toggle="' + escapeHtml(key) + '" aria-label="选择时间">◷</button>' +
        '<div class="inline-time-panel">' +
        '<div class="inline-time-body">' +
        '<div class="inline-time-fields">' +
        '<input type="text" inputmode="numeric" data-batch-time-date="' + escapeHtml(key) + '" value="' + escapeHtml(dateValue) + '" placeholder="选择日期">' +
        '<input type="text" inputmode="numeric" data-batch-time-clock="' + escapeHtml(key) + '" value="' + escapeHtml(timeValue) + '" placeholder="选择时间">' +
        '</div>' +
        '<div class="inline-time-calendar">' + buildBatchCalendarHtml(key, dateValue) + '</div>' +
        '</div>' +
        '<div class="inline-time-footer">' +
        '<button class="inline-time-now" type="button" data-batch-time-now="' + escapeHtml(key) + '">此刻</button>' +
        '<button class="inline-time-confirm is-primary" type="button" data-batch-time-confirm="' + escapeHtml(key) + '">确定</button>' +
        '</div>' +
        '</div>' +
        '</div>';
    }

    function buildBatchCalendarHtml(key, dateValue) {
      var selected = parseInlineDate(dateValue);
      var firstDay = new Date(selected.year, selected.month - 1, 1).getDay();
      var today = inlineDateValue(new Date());
      var cells = [];
      for (var i = 0; i < 42; i += 1) {
        var dayOffset = i - firstDay + 1;
        var cellDate = new Date(selected.year, selected.month - 1, dayOffset);
        var cellValue = inlineDateValue(cellDate);
        var muted = cellDate.getMonth() !== selected.month - 1;
        var active = cellValue === selected.value;
        var isToday = cellValue === today;
        cells.push('<button class="inline-time-day' + (muted ? ' is-muted' : '') + (active ? ' is-active' : '') + (isToday ? ' is-today' : '') + '" type="button" data-batch-time-day="' + escapeHtml(key) + '" data-value="' + cellValue + '">' + cellDate.getDate() + '</button>');
      }
      return '<div class="inline-time-calendar-head">' +
        '<button type="button" data-batch-time-month="' + escapeHtml(key) + '" data-offset="-12">«</button>' +
        '<button type="button" data-batch-time-month="' + escapeHtml(key) + '" data-offset="-1">‹</button>' +
        '<strong>' + selected.year + ' 年 ' + selected.month + ' 月</strong>' +
        '<button type="button" data-batch-time-month="' + escapeHtml(key) + '" data-offset="1">›</button>' +
        '<button type="button" data-batch-time-month="' + escapeHtml(key) + '" data-offset="12">»</button>' +
        '</div>' +
        '<div class="inline-time-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>' +
        '<div class="inline-time-days">' + cells.join("") + '</div>';
    }

    function renderBatchValueControl(fieldId, key) {
      var meta = fieldMeta[fieldId] || { kind: 'text' };
      var value = sampleValueForField(fieldId);
      if (meta.editMode === 'dialog') {
        var displayText = displayValue(value) || '点击填写';
        return '<input type="hidden" data-batch-value="' + escapeHtml(key) + '" data-batch-field="' + escapeHtml(fieldId) + '" value="' + escapeHtml(value) + '">' +
          '<button class="batch-dialog-value" type="button" data-batch-value-dialog="' + escapeHtml(key) + '" data-field-id="' + escapeHtml(fieldId) + '" title="' + escapeHtml(displayText) + '">' + escapeHtml(displayText) + '</button>';
      }
      if (meta.kind === 'select') {
        return renderBatchSelectControl(fieldId, key, meta, false, value);
      }
      if (meta.kind === 'multiselect') {
        return renderBatchSelectControl(fieldId, key, meta, true, value);
      }
      if (meta.kind === 'time') {
        return renderBatchTimeControl(fieldId, key, value);
      }
      if (meta.kind === 'file' || meta.kind === 'files') {
        return '<input class="value-input" data-batch-value="' + escapeHtml(key) + '" data-batch-field="' + escapeHtml(fieldId) + '" value="' + escapeHtml(value) + '" placeholder="' + (meta.kind === 'file' ? '单文件名' : '多个文件名，逗号分隔') + '">';
      }
      if (meta.kind === 'textarea' || meta.kind === 'richtext') {
        return '<textarea class="value-textarea" data-batch-value="' + escapeHtml(key) + '" data-batch-field="' + escapeHtml(fieldId) + '">' + escapeHtml(value) + '</textarea>';
      }
      return '<input class="value-input" data-batch-value="' + escapeHtml(key) + '" data-batch-field="' + escapeHtml(fieldId) + '" type="' + (meta.kind === 'number' ? 'number' : 'text') + '" value="' + escapeHtml(value) + '">';
    }

    function renderBatchEditList() {
      var list = document.getElementById('batchEditList');
      var card = document.getElementById('batchEditCard');
      card.style.display = '';
      var selected = collectBatchSelection();
      var products = selected.products.map(function(id) { return getItem('products', id); }).filter(Boolean);
      var fields = selected.fields.map(function(id) { return getItem('fields', id); }).filter(Boolean);
      var channels = (selected.channels.length ? selected.channels.map(function(id) { return getItem('channels', id); }) : flatten('channels')).filter(Boolean);
      if (!products.length || !fields.length) {
        list.innerHTML = '<div class="batch-empty">请选择商品和字段后维护批量字段值</div>';
        return;
      }
      if (!channels.length) {
        list.innerHTML = '<div class="batch-empty">暂无可用渠道</div>';
        return;
      }
      var rows = [];
      products.forEach(function(product) {
        fields.forEach(function(field) {
          var key = batchValueKey(product.id, field.id);
          rows.push('<tr>' +

    function applyBatchAdd() {
      var selected = collectBatchSelection();
      if (!selected.products.length || !selected.fields.length) {
        showToast('请先选择商品和字段');
        return;
      }
      var batchRows = collectBatchRows();
      var existingIds = {};
      state.rows.forEach(function(row) { existingIds[row.id] = true; });
      var addedCount = 0;
      batchRows.forEach(function(item) {
        var product = getItem('products', item.productId);
        var field = getItem('fields', item.fieldId);
        var channel = getItem('channels', item.channelId);
        if (!product || !field || !channel) return;
        var id = product.id + '_' + channel.id + '_' + field.id;
        if (existingIds[id]) return;
        var row = createRow(product, channel, field, state.rows.length, true, item.value || "");
        state.rows.push(row);
        existingIds[id] = true;
        addedCount += 1;
      });
      renderTable();
      closeBatchDialog();
      showToast('批量新增完成，新增 ' + addedCount + ' 条，已存在的不重复新增');
    }

    function applyBatchEdit() {
      var selected = collectBatchSelection();
      if (!selected.products.length || !selected.fields.length) {
        showToast('请先选择商品和字段');
        return;
      }
      var configs = collectBatchRows();
      var updated = 0;
      configs.forEach(function(item) {
        state.rows.forEach(function(row) {
          if (row.product.id !== item.productId) return;
          if (row.fieldId !== item.fieldId) return;
          if (row.channel.id !== item.channelId) return;
          setRowModifyValue(row, item.value);
          row.inlineEditing = false;
          updated += 1;
        });
      });
      renderTable();
      closeBatchDialog();
      showToast('批量修改完成，共写入 ' + updated + ' 条');
    }

    function confirmBatchDialog() {
      if (state.batchMode === 'add') {
        applyBatchAdd();
        return;
      }
      if (state.batchMode === 'edit') {
        applyBatchEdit();
      }
    }

    function markRowsDeleted(rowIds) {
      var count = 0;
      var removedNewCount = 0;
      state.rows.forEach(function(row) {
        if (rowIds.indexOf(row.id) < 0) return;
        if (row.isNew) {
          removedNewCount += 1;
          return;
        }
        row.isDeleted = true;
        row.selected = false;
        row.inlineEditing = false;
        count += 1;
      });
      if (removedNewCount) {
        state.rows = state.rows.filter(function(row) {
          return !(row.isNew && rowIds.indexOf(row.id) > -1);
        });
      }
      renderTable();
      showToast('已删除 ' + (count + removedNewCount) + ' 条' + (removedNewCount ? '，其中新增数据已直接移除' : ''));
    }

    function submitRows() {
      var list = [];
      state.rows.forEach(function(row) {
        if (rowDeleted(row)) {
          list.push({ row: row, action: '删除', oldValue: row.currentValue || '-', newValue: '-' });
          return;
        }
        if (rowAdded(row)) {
          list.push({ row: row, action: '新增', oldValue: '-', newValue: row.modifyValue || '-' });
          return;
        }
        if (rowChanged(row)) {
          list.push({ row: row, action: '修改', oldValue: row.currentValue || '-', newValue: row.modifyValue || '-' });
        }
      });
      return list;
    }

    function openSubmitDialog() {
      var list = submitRows();
      if (!list.length) {
        showToast('暂无需要提交的数据');
        return;
      }
      var changeCount = list.filter(function(item) { return item.action === '修改'; }).length;
      var addCount = list.filter(function(item) { return item.action === '新增'; }).length;
      var deleteCount = list.filter(function(item) { return item.action === '删除'; }).length;
      document.getElementById('submitSummary').textContent = '本次提交共 ' + list.length + ' 条，请按分类核对后确认提交。';
      document.getElementById('submitChangeCount').textContent = changeCount;
      document.getElementById('submitAddCount').textContent = addCount;
      document.getElementById('submitDeleteCount').textContent = deleteCount;
      state.submitActiveTab = changeCount ? '修改' : addCount ? '新增' : '删除';
      renderSubmitTabs();
      renderSubmitTable();
      document.getElementById('submitDialog').classList.add('is-visible');
      document.getElementById('submitDialog').setAttribute('aria-hidden', 'false');

    function ensureTooltip() {
      var tooltip = document.getElementById("elTooltipPopper");
      if (!tooltip) {
        tooltip = document.createElement("div");
        tooltip.id = "elTooltipPopper";
        tooltip.className = "el-tooltip-popper";
        document.body.appendChild(tooltip);
      }
      return tooltip;
    }

    function showTooltip(target) {
      var text = target && target.getAttribute("data-tooltip");
      if (!text) return;
      var tooltip = ensureTooltip();
      tooltip.textContent = text;
      tooltip.style.display = "block";
      var rect = target.getBoundingClientRect();
      var tipRect = tooltip.getBoundingClientRect();
      var left = rect.left + rect.width / 2 - tipRect.width / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - tipRect.width - 8));
      var top = rect.top - tipRect.height - 10;
      if (top < 8) {
        top = rect.bottom + 10;
        tooltip.style.setProperty("--arrow-bottom", "auto");
      }
      tooltip.style.left = left + "px";
      tooltip.style.top = top + "px";
    }

    function hideTooltip() {
      var tooltip = document.getElementById("elTooltipPopper");
      if (tooltip) {
        tooltip.style.display = "none";
      }
    }

        return;
      }
      if (inlineSelectOption) {
        var inlineRowId = inlineSelectOption.getAttribute("data-inline-select-option");
        var inlineRow = findRow(inlineRowId);
        var isMultiple = inlineSelectOption.getAttribute("data-multiple") === "true";
        var inlineControl = document.querySelector('[data-inline-select="' + inlineRowId + '"]');
        if (inlineRow && inlineControl) {
          if (isMultiple) {
            inlineSelectOption.classList.toggle("is-active");
            var selectedValues = Array.from(inlineControl.querySelectorAll(".inline-select-option.is-active")).map(function(option) {
              return option.getAttribute("data-value");
            });
            setRowModifyValue(inlineRow, selectedValues.join(", "));
            var labelNode = inlineControl.querySelector(".inline-select-label");
            if (labelNode) labelNode.textContent = selectedValues.length ? selectedValues.join(", ") : "请选择";
            var tr = inlineControl.closest("tr");
            if (tr) tr.classList.toggle("is-dirty", rowChanged(inlineRow));
            refreshSummaryOnly();
          } else {
            setRowModifyValue(inlineRow, inlineSelectOption.getAttribute("data-value"));
            inlineRow.inlineEditing = false;
            renderTable();
          }
        }
        return;
      }
      if (searchTypeToggle) {
        var searchScope = searchTypeToggle.getAttribute("data-search-type-toggle");
        var searchNode = document.getElementById(searchScope + "ProductSearchType");
        var nextSearchOpen = !searchNode.classList.contains("is-open");
        closeSearchTypePopovers(searchScope);
        searchNode.classList.toggle("is-open", nextSearchOpen);
        return;
      }
      if (searchTypeOption) {
        var typeScope = searchTypeOption.getAttribute("data-search-type-option");
        var typeValue = searchTypeOption.getAttribute("data-value");
        if (typeScope === "source") {
          state.sourceProductSearchType = typeValue;
          state.sourceChecked = [];
        } else {
          state.selectedProductSearchType = typeValue;
          state.selectedChecked = [];
        }
        closeSearchTypePopovers();
        renderDialog();
        return;
      }
      if (batchChannelToggle) {
        var channelKey = batchChannelToggle.getAttribute("data-batch-channel-toggle");
        var channelNode = document.querySelector('[data-channel-select="' + channelKey + '"]');
        var shouldOpen = !channelNode.classList.contains("is-open");
        closeBatchChannelSelects(channelKey);
        channelNode.classList.toggle("is-open", shouldOpen);
        if (shouldOpen) {
          positionFloatingPanel(channelNode, ".batch-channel-dropdown", 260);
        } else {
          channelNode.classList.remove("is-floating");
        }
        return;
      }
      if (batchChannelOption) {
        var optionKey = batchChannelOption.getAttribute("data-batch-channel-option");
        var selectNode = document.querySelector('[data-channel-select="' + optionKey + '"]');
        var hidden = document.querySelector('[data-batch-channel="' + optionKey + '"]');
        var label = selectNode && selectNode.querySelector(".batch-channel-label");
        if (hidden) hidden.value = batchChannelOption.getAttribute("data-value");
        if (label) label.textContent = batchChannelOption.getAttribute("data-label");
        if (selectNode) {
          Array.from(selectNode.querySelectorAll(".batch-channel-option")).forEach(function(option) {
            option.classList.toggle("is-active", option === batchChannelOption);
          });
          selectNode.classList.remove("is-open");
        }
        return;
      }
      if (groupToggle) {
        var groupScope = groupToggle.getAttribute("data-group-filter-toggle");
        var groupNode = document.getElementById(groupScope + "GroupFilter");
        var nextOpen = !groupNode.classList.contains("is-open");
        closeGroupFilterPopovers(groupScope);
        groupNode.classList.toggle("is-open", nextOpen);
        return;
      }
      if (groupAction) {
        var parts = groupAction.split("-");
        var actionScope = parts[0];
        var actionType = parts[1];
        var groupValues = actionType === "all" ? channelGroupNames() : [];
        if (actionScope === "source") {
          state.sourceGroupFilters = groupValues;
          state.sourceChecked = [];
        }
        if (actionScope === "selected") {
          state.selectedGroupFilters = groupValues;
          state.selectedChecked = [];
        }
        renderDialog();
        return;
      }
      if (batchValueDialog) {
        openBatchValueDialog(batchValueDialog.getAttribute("data-batch-value-dialog"), batchValueDialog.getAttribute("data-field-id"));
        return;
      }
      if (uploadPick) {
        var uploadKind = uploadPick.getAttribute("data-upload-pick");
        var uploadFiles = currentUploadFiles();
        var nextIndex = uploadFiles.length + 1;
        var nextFile = uploadKind === "file" ? "upload_cover_demo.png" : "upload_banner_" + nextIndex + ".png";
        syncUploadFileList(uploadKind === "file" ? [nextFile] : uploadFiles.concat(nextFile));
        return;
      }
      if (uploadRemove) {
        var removeIndex = Number(uploadRemove.getAttribute("data-upload-remove"));
        var remainingFiles = currentUploadFiles().filter(function(_, index) {
          return index !== removeIndex;
        });
        syncUploadFileList(remainingFiles);
        return;
      }

      if (openKey && !removeTagKey) openDialog(openKey);
      if (batchOpenKey && !removeBatchTagKey) openDialog(batchOpenKey, "batch");
      if (fieldTemplate && state.activeDimension === "fields") {
        state.draftSelection = (fieldTemplates[fieldTemplate] || []).slice();
        state.sourceChecked = [];
        state.selectedChecked = [];
        renderDialog();
      }
      if (clearKey) {
        state.selected[clearKey] = [];
        renderTags(clearKey);
      }
      if (removeTagKey) {
        var id = event.target.getAttribute("data-id");
        state.selected[removeTagKey] = state.selected[removeTagKey].filter(function(itemId) {
          return itemId !== id;
        });
        renderTags(removeTagKey);
      }
      if (removeBatchTagKey) {
        var batchRemoveId = event.target.getAttribute("data-id");
        state.batchSelected[removeBatchTagKey] = state.batchSelected[removeBatchTagKey].filter(function(itemId) {
          return itemId !== batchRemoveId;
        });
        renderBatchTags(removeBatchTagKey);
        if (removeBatchTagKey === "products" || removeBatchTagKey === "fields") {
          renderBatchEditList();
        }
      }
      if (action === "query") {
        buildRows();
        document.querySelector(".table-panel").scrollIntoView({ block: "start" });
        showToast("查询完成");
      }
      if (action === "resetAll") resetAll();
      if (action === "clearTableKeyword") {
        state.keyword = "";
        document.getElementById("tableKeyword").value = "";
        syncTableKeywordClear();
        renderTable();
      }
      if (action === "batchAdd") openBatchDialog("add");
      if (action === "batchEdit") openBatchDialog("edit");
      if (action === "batchDelete") {
        if (!state.selectedRows.length) {
          showToast("请先勾选需要删除的行");
        } else {
          markRowsDeleted(state.selectedRows.slice());
        }
      }
      if (action === "cancel") {
        state.rows.forEach(function(row) {
          setRowModifyValue(row, row.currentValue);
          row.inlineEditing = false;
          row.isDeleted = false;
        });
        renderTable();
        showToast("已取消本次修改");
      }
      if (action === "save") {
        openSubmitDialog();
      }
      if (transfer === "add") {
        addDraftSelection(state.sourceChecked);
      }
      if (transfer === "remove") {
        removeDraftSelection(state.selectedChecked);
      }
      if (transfer === "selectAll") {
        addDraftSelection(flatten(state.activeDimension).map(function(item) { return item.id; }));
      }
      if (transfer === "clear") {
        state.draftSelection = [];
        state.selectedChecked = [];
        renderDialog();
      }
      if (dialog === "close" || dialog === "cancel") closeDialog();
      if (dialog === "confirm") {
        if (state.selectorScope === "batch") {
          state.batchSelected[state.activeDimension] = state.draftSelection.slice();
          renderBatchTags(state.activeDimension);
          if (state.activeDimension === "products" || state.activeDimension === "fields") {
            renderBatchEditList();
          }
        } else {
          state.selected[state.activeDimension] = state.draftSelection.slice();
          renderTags(state.activeDimension);
        }
        closeDialog();
      }
      if (rowReset) {
        state.rows.forEach(function(row) {
          if (row.id === rowReset) {
            setRowModifyValue(row, row.currentValue);
            row.inlineEditing = false;
            row.isDeleted = false;
          }
        });
        renderTable();
      }
      if (rowDelete) {
        markRowsDeleted([rowDelete]);
      }
      if (dialogEdit) openEditDialog(dialogEdit);
      if (inlineEdit) {
        state.rows.forEach(function(row) {
          row.inlineEditing = row.id === inlineEdit;
        });
        renderTable();
      }
      if (editDialogAction === "close" || editDialogAction === "cancel") closeEditDialog();
      if (editDialogAction === "confirm") confirmEditDialog();
      if (batchDialogAction === "close" || batchDialogAction === "cancel") closeBatchDialog();
      if (batchDialogAction === "confirm") confirmBatchDialog();
      if (submitDialogAction === "close" || submitDialogAction === "cancel") closeSubmitDialog();
      if (submitDialogAction === "confirm") confirmSubmitDialog();
      if (submitTab) {
        state.submitActiveTab = submitTab.getAttribute("data-submit-tab");
        renderSubmitTabs();
        renderSubmitTable();
      }
    });

    document.addEventListener("change", function(event) {
      var sourceId = event.target.getAttribute("data-source-check");
      var selectedId = event.target.getAttribute("data-selected-check");
      var checkAll = event.target.getAttribute("data-check-all");
      var groupCheck = event.target.getAttribute("data-group-filter-check");
      var inlineTimeDate = event.target.getAttribute("data-inline-time-date");
      var inlineTimeClock = event.target.getAttribute("data-inline-time-clock");
      var batchTimeDate = event.target.getAttribute("data-batch-time-date");
      var batchTimeClock = event.target.getAttribute("data-batch-time-clock");
      var rowId = event.target.getAttribute("data-row-edit");
      var rowSelectId = event.target.getAttribute("data-row-select");
      if (batchTimeDate || batchTimeClock) {
        updateBatchTimeValue(batchTimeDate || batchTimeClock, true);
        if (batchTimeDate) refreshBatchTimeCalendar(batchTimeDate, event.target.value);
        return;
      }
      if (inlineTimeDate || inlineTimeClock) {
        updateInlineTimeValue(inlineTimeDate || inlineTimeClock, true);
        if (inlineTimeDate) refreshInlineTimeCalendar(inlineTimeDate, event.target.value);
        return;
      }
      if (groupCheck) {
        var list = groupCheck === "source" ? state.sourceGroupFilters : state.selectedGroupFilters;
        if (event.target.checked && list.indexOf(event.target.value) === -1) {
          list.push(event.target.value);
        }
        if (!event.target.checked) {
          list = list.filter(function(groupName) { return groupName !== event.target.value; });
        }
        if (groupCheck === "source") {
          state.sourceGroupFilters = list;
          state.sourceChecked = [];
        } else {
          state.selectedGroupFilters = list;
          state.selectedChecked = [];
        }
        renderDialog();
        return;
      }
      if (checkAll === "source") {
        var sourceIds = Array.from(document.querySelectorAll("[data-source-check]")).map(function(input) {
          return input.getAttribute("data-source-check");
        });
        if (event.target.checked) {
          sourceIds.forEach(function(id) {
            if (state.sourceChecked.indexOf(id) === -1) state.sourceChecked.push(id);
          });
        } else {
          state.sourceChecked = state.sourceChecked.filter(function(id) {
            return sourceIds.indexOf(id) === -1;
          });
        }
        renderDialog();
        return;
      }
      if (checkAll === "selected") {
        var selectedIds = Array.from(document.querySelectorAll("[data-selected-check]")).map(function(input) {
          return input.getAttribute("data-selected-check");
        });
        if (event.target.checked) {
          selectedIds.forEach(function(id) {
            if (state.selectedChecked.indexOf(id) === -1) state.selectedChecked.push(id);
          });
        } else {
          state.selectedChecked = state.selectedChecked.filter(function(id) {
            return selectedIds.indexOf(id) === -1;
          });
        }
        renderDialog();
        return;
      }
      if (sourceId) {
        if (event.target.checked && state.sourceChecked.indexOf(sourceId) === -1) {
          state.sourceChecked.push(sourceId);
        }
        if (!event.target.checked) {
          state.sourceChecked = state.sourceChecked.filter(function(id) { return id !== sourceId; });
        }
        renderDialog();
        return;
      }
      if (selectedId) {
        if (event.target.checked && state.selectedChecked.indexOf(selectedId) === -1) {
          state.selectedChecked.push(selectedId);
        }
        if (!event.target.checked) {
          state.selectedChecked = state.selectedChecked.filter(function(id) { return id !== selectedId; });
        }
        renderDialog();
        return;
      }
      if (rowId) {
        state.rows.forEach(function(row) {
          if (row.id === rowId) {
            var value = event.target.multiple ? Array.from(event.target.selectedOptions).map(function(option) { return option.value; }).join(", ") : event.target.value;
            setRowModifyValue(row, value);
            row.inlineEditing = false;
          }
        });
        renderTable();
      }
      if (rowSelectId) {
        state.rows.forEach(function(row) {
          if (row.id === rowSelectId) {
            row.selected = event.target.checked;
          }
        });
        renderTable();
      }
      if (event.target.id === "selectAllRows") {
        var rows = filteredRows();
        rows.forEach(function(row) {
          row.selected = event.target.checked;
        });
        renderTable();
      }
    });

    document.addEventListener("input", function(event) {
      var inlineTimeDate = event.target.getAttribute("data-inline-time-date");
      var inlineTimeClock = event.target.getAttribute("data-inline-time-clock");
      var batchTimeDate = event.target.getAttribute("data-batch-time-date");
      var batchTimeClock = event.target.getAttribute("data-batch-time-clock");
      if (batchTimeDate || batchTimeClock) {
        updateBatchTimeValue(batchTimeDate || batchTimeClock, false);
        if (batchTimeDate) refreshBatchTimeCalendar(batchTimeDate, event.target.value);
        return;
      }
      if (inlineTimeDate || inlineTimeClock) {
        updateInlineTimeValue(inlineTimeDate || inlineTimeClock, false);
        if (inlineTimeDate) refreshInlineTimeCalendar(inlineTimeDate, event.target.value);
        return;
      }
      var rowId = event.target.getAttribute("data-row-edit");
      if (!rowId) return;
      var row = findRow(rowId);
      if (!row) return;
      setRowModifyValue(row, event.target.value);
      var tableRow = event.target.closest("tr");
      if (tableRow) {
        tableRow.classList.toggle("is-dirty", rowChanged(row));
      }
      refreshSummaryOnly();
    });

    document.addEventListener("mouseover", function(event) {
      var target = event.target.closest("[data-tooltip]");
      if (target) {
        showTooltip(target);
      }
    });

    document.addEventListener("mouseout", function(event) {
      if (event.target.closest("[data-tooltip]")) {
        hideTooltip();
      }
    });

    document.addEventListener("focusin", function(event) {
      var target = event.target.closest("[data-tooltip]");
      if (target) {
        showTooltip(target);
      }
    });

    document.addEventListener("focusout", function(event) {
      if (event.target.closest("[data-tooltip]")) {
        hideTooltip();
      }
    });

    document.getElementById("selectorKeyword").addEventListener("input", renderDialog);
    document.getElementById("selectedKeyword").addEventListener("input", renderDialog);
    document.getElementById("tableKeyword").addEventListener("input", function(event) {
      state.keyword = event.target.value;
      syncTableKeywordClear();
      renderTable();
    });

    document.getElementById("selectorDialog").addEventListener("click", function(event) {
      if (event.target.id === "selectorDialog") closeDialog();
    });

    document.getElementById("editDialog").addEventListener("click", function(event) {
      if (event.target.id === "editDialog") closeEditDialog();
    });

    document.getElementById("batchDialog").addEventListener("click", function(event) {
      if (event.target.id === "batchDialog") closeBatchDialog();
    });

    document.getElementById("submitDialog").addEventListener("click", function(event) {
      if (event.target.id === "submitDialog") closeSubmitDialog();
    });

    document.getElementById("batchEditList").addEventListener("scroll", function() {
      closeBatchValueSelects();
      closeBatchTimePickers();
      closeBatchChannelSelects();
    });

    document.querySelector("#batchDialog .batch-body").addEventListener("scroll", function() {
      closeBatchValueSelects();
      closeBatchTimePickers();
      closeBatchChannelSelects();
    });

    window.addEventListener("resize", function() {
      closeBatchValueSelects();
      closeBatchTimePickers();
    });

    renderAllTags();
    buildRows();
    syncTableKeywordClear();
  </script>
</body>
</html>

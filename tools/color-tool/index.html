<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>颜色转换与对比度 · zktool</title>
    <meta name="description" content="HEX、RGB、HSL 互转，调色、预览与 WCAG 对比度检查。" />
    <meta name="theme-color" content="#f6f8fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1420" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="../../assets/tool-page.css" />
    <script src="../../assets/analytics.js"></script>
    <script src="../../assets/clipboard.js"></script>
    <style>.swatch{height:7rem;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}.mini{width:2.4rem;height:2.4rem;border-radius:10px;border:1px solid var(--border)}</style>
</head>
<body>
<div class="bg-fx" aria-hidden="true"></div>
<main class="wrap">
    <div class="top"><a class="back" href="../../">← 返回主页</a><p class="meta">Color</p></div>
    <h1><span class="title">颜色转换与对比度</span></h1>
    <p class="lead">输入 HEX 或 RGB，转换为常用格式，生成浅深色阶，并检查前景色/背景色对比度。</p>
    <div class="tool-grid">
        <section class="panel">
            <h2>颜色</h2>
            <div class="row"><input id="color" type="color" value="#2563eb" /><input id="text" class="mono grow" value="#2563eb" /></div>
            <div class="swatch" id="swatch"></div>
            <div class="row"><label class="grow">前景色<input id="fg" class="mono" value="#1e293b" /></label><label class="grow">背景色<input id="bg" class="mono" value="#ffffff" /></label></div>
        </section>
        <aside>
            <section class="panel"><h2>格式</h2><pre class="output min-h-8" id="formats"></pre><div class="row"><button class="btn primary" id="copy">复制格式</button></div><p class="hint" id="copyStatus"></p></section>
            <section class="panel"><h2>色阶</h2><div class="chips" id="palette"></div></section>
            <section class="panel"><h2>对比度</h2><div class="output min-h-4" id="contrast"></div></section>
        </aside>
    </div>
</main>
<script>
(function () {
    "use strict";
    var color = document.getElementById("color"), text = document.getElementById("text"), swatch = document.getElementById("swatch"), formats = document.getElementById("formats"), palette = document.getElementById("palette"), fg = document.getElementById("fg"), bg = document.getElementById("bg"), contrast = document.getElementById("contrast");
    function parse(s) {
        s = s.trim();
        if (/^#?[0-9a-f]{3}$/i.test(s)) { s = s.replace("#","").split("").map(function (c) { return c+c; }).join(""); }
        if (/^#?[0-9a-f]{6}$/i.test(s)) { s = s.replace("#",""); return [parseInt(s.slice(0,2),16), parseInt(s.slice(2,4),16), parseInt(s.slice(4,6),16)]; }
        var m = s.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i); if (m) return [+m[1], +m[2], +m[3]];
        throw new Error("无法识别颜色");
    }
    function hex(rgb) { return "#" + rgb.map(function (n) { return Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2,"0"); }).join(""); }
    function hsl(rgb) {
        var r=rgb[0]/255,g=rgb[1]/255,b=rgb[2]/255,max=Math.max(r,g,b),min=Math.min(r,g,b),h=0,s,l=(max+min)/2,d=max-min;
        if(d){s=l>.5?d/(2-max-min):d/(max+min); if(max===r)h=(g-b)/d+(g<b?6:0); else if(max===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60;}
        return [Math.round(h), Math.round(s*100), Math.round(l*100)];
    }
    function mix(rgb, target, t) { return rgb.map(function (v,i) { return v + (target[i]-v)*t; }); }
    function lum(rgb) { return rgb.map(function (v) { v/=255; return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4); }).reduce(function(a,v,i){return a+v*[.2126,.7152,.0722][i];},0); }
    function render() {
        try {
            var rgb = parse(text.value), hs = hsl(rgb), hx = hex(rgb);
            color.value = hx; swatch.style.background = hx;
            formats.textContent = [hx, "rgb(" + rgb.join(", ") + ")", "hsl(" + hs[0] + " " + hs[1] + "% " + hs[2] + "%)", "css var: --color: " + hx + ";"].join("\n");
            var shades = [0.75,0.5,0.25,0,0.25,0.5,0.75].map(function (t,i) { return i<3 ? mix(rgb,[255,255,255],t) : i===3 ? rgb : mix(rgb,[0,0,0],t); });
            palette.innerHTML = shades.map(function (c) { var h=hex(c); return "<span class='chip'><span class='mini' style='background:"+h+"'></span>"+h+"</span>"; }).join("");
        } catch (e) { formats.textContent = e.message; }
        renderContrast();
    }
    function renderContrast() {
        try {
            var lf = lum(parse(fg.value)), lb = lum(parse(bg.value));
            var ratio = (Math.max(lf, lb) + .05) / (Math.min(lf, lb) + .05);
            var normal = ratio >= 7 ? "<span class='ok'>AAA 通过</span>" : ratio >= 4.5 ? "<span class='ok'>AA 通过</span>" : "<span class='bad'>不达标</span>";
            var large = ratio >= 4.5 ? "<span class='ok'>AAA 通过</span>" : ratio >= 3 ? "<span class='ok'>AA 通过</span>" : "<span class='bad'>不达标</span>";
            contrast.innerHTML = "<b class='mono'>" + ratio.toFixed(2) + ":1</b><br>普通正文（≥4.5:1）：" + normal + "<br>大字号（≥3:1）：" + large;
        } catch (e) { contrast.innerHTML = "<span class='bad'>" + e.message + "</span>"; }
    }
    color.oninput = function () { text.value = color.value; render(); };
    [text, fg, bg].forEach(function (el) { el.addEventListener("input", render); });
    document.getElementById("copy").onclick = function () {
        var cs = document.getElementById("copyStatus");
        copyText(formats.textContent).then(function () { cs.textContent = "已复制"; cs.className = "hint ok"; },
            function () { cs.textContent = "复制失败，请手动选择复制"; cs.className = "hint bad"; });
    };
    render();
})();
</script>
</body>
</html>

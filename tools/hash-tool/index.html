<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hash 计算器 · zktool</title>
    <meta name="description" content="计算文本或文件的 MD5、SHA-1、SHA-256、SHA-512 摘要，浏览器本地处理。" />
    <meta name="theme-color" content="#f6f8fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1420" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="../../assets/tool-page.css" />
    <script src="../../assets/analytics.js"></script>
    <script src="../../assets/clipboard.js"></script>
    <style>
        .drop { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.4rem; min-height:7rem; margin-bottom:.8rem; border:2px dashed var(--border); border-radius:12px; color:var(--text-3); font-size:.86rem; cursor:pointer; transition:border-color .2s, background .2s; }
        .drop.over, .drop:hover { border-color: var(--brand-ring); background: var(--brand-soft); color: var(--text-2); }
        .hash-row { margin-bottom:.65rem; }
        .hash-row b { display:block; margin-bottom:.25rem; color:var(--text-2); font-size:.76rem; letter-spacing:.08em; text-transform:uppercase; }
        .hash-val { display:flex; gap:.5rem; align-items:center; }
        .hash-val code { flex:1; min-width:0; padding:.5rem .65rem; border:1px solid var(--border); border-radius:8px; background:var(--bg-soft); font-family:var(--mono); font-size:.8rem; word-break:break-all; }
        .hash-val .btn { min-height:2.1rem; padding:.3rem .7rem; font-size:.78rem; }
    </style>
</head>
<body>
<div class="bg-fx" aria-hidden="true"></div>
<main class="wrap">
    <div class="top"><a class="back" href="../../">← 返回主页</a><p class="meta">Hash / Digest</p></div>
    <h1><span class="title">Hash 计算器</span></h1>
    <p class="lead">计算文本或文件的 MD5、SHA-1、SHA-256、SHA-512 摘要，全部在浏览器本地完成，文件不会上传。</p>
    <div class="tool-grid">
        <section class="panel">
            <h2>输入</h2>
            <textarea id="input" spellcheck="false" placeholder="输入文本，或在下方拖入文件..."></textarea>
            <div class="drop" id="drop" tabindex="0" role="button" aria-label="选择或拖入文件">
                <span>拖入文件，或点击选择</span>
                <span class="mono" id="fileInfo"></span>
            </div>
            <input type="file" id="file" hidden />
            <div class="row"><button class="btn danger" id="clear">清空</button><span class="hint" id="status"></span></div>
        </section>
        <aside>
            <section class="panel">
                <h2>摘要结果</h2>
                <div id="results"></div>
                <p class="hint">MD5 已不适合安全用途，仅用于校验与兼容旧系统。</p>
            </section>
        </aside>
    </div>
</main>
<script>
(function () {
    "use strict";
    var input = document.getElementById("input"), drop = document.getElementById("drop"), file = document.getElementById("file"), fileInfo = document.getElementById("fileInfo"), results = document.getElementById("results"), status = document.getElementById("status");
    var ALGOS = ["MD5", "SHA-1", "SHA-256", "SHA-512"];
    var currentFile = null, seq = 0;

    /* MD5（Web Crypto 不含 MD5，内置精简实现，输入为 Uint8Array） */
    function md5(bytes) {
        var s = [7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
        var K = [];
        for (var i = 0; i < 64; i++) K[i] = Math.floor(Math.abs(Math.sin(i + 1)) * 4294967296);
        var n = bytes.length, ml = n * 8;
        var withPad = ((n + 8) >> 6 << 6) + 64;
        var buf = new Uint8Array(withPad);
        buf.set(bytes); buf[n] = 0x80;
        var dv = new DataView(buf.buffer);
        dv.setUint32(withPad - 8, ml >>> 0, true);
        dv.setUint32(withPad - 4, Math.floor(ml / 4294967296), true);
        var a0 = 0x67452301, b0 = 0xefcdab89, c0 = 0x98badcfe, d0 = 0x10325476;
        for (var off = 0; off < withPad; off += 64) {
            var M = [];
            for (i = 0; i < 16; i++) M[i] = dv.getUint32(off + i * 4, true);
            var A = a0, B = b0, C = c0, D = d0;
            for (i = 0; i < 64; i++) {
                var F, g;
                if (i < 16) { F = (B & C) | (~B & D); g = i; }
                else if (i < 32) { F = (D & B) | (~D & C); g = (5 * i + 1) % 16; }
                else if (i < 48) { F = B ^ C ^ D; g = (3 * i + 5) % 16; }
                else { F = C ^ (B | ~D); g = (7 * i) % 16; }
                F = (F + A + K[i] + M[g]) >>> 0;
                A = D; D = C; C = B;
                B = (B + ((F << s[i]) | (F >>> (32 - s[i])))) >>> 0;
            }
            a0 = (a0 + A) >>> 0; b0 = (b0 + B) >>> 0; c0 = (c0 + C) >>> 0; d0 = (d0 + D) >>> 0;
        }
        var out = new Uint8Array(16), odv = new DataView(out.buffer);
        odv.setUint32(0, a0, true); odv.setUint32(4, b0, true); odv.setUint32(8, c0, true); odv.setUint32(12, d0, true);
        return out;
    }
    function toHex(arr) { return Array.from(new Uint8Array(arr)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join(""); }

    function digest(algo, bytes) {
        if (algo === "MD5") return Promise.resolve(toHex(md5(bytes)));
        return crypto.subtle.digest(algo, bytes).then(toHex);
    }

    function renderRows(map) {
        results.innerHTML = ALGOS.map(function (a) {
            return "<div class='hash-row'><b>" + a + "</b><div class='hash-val'><code id='h-" + a + "'>" + (map[a] || "...") + "</code><button class='btn' data-copy='" + a + "'>复制</button></div></div>";
        }).join("");
    }

    function compute(bytes, label) {
        var my = ++seq;
        renderRows({});
        status.textContent = "计算中..."; status.className = "hint";
        Promise.all(ALGOS.map(function (a) {
            return digest(a, bytes).then(function (hex) {
                if (my === seq) document.getElementById("h-" + a).textContent = hex;
                return hex;
            });
        })).then(function () {
            if (my !== seq) return;
            status.textContent = label + "（" + bytes.length + " 字节）计算完成"; status.className = "hint ok";
        }, function (e) {
            if (my !== seq) return;
            status.textContent = "计算失败：" + e.message; status.className = "hint bad";
        });
    }

    function fromText() {
        currentFile = null; fileInfo.textContent = "";
        compute(new TextEncoder().encode(input.value), "文本");
    }
    function fromFile(f) {
        if (!f) return;
        if (f.size > 256 * 1024 * 1024) { status.textContent = "文件超过 256MB，请换小一点的文件"; status.className = "hint bad"; return; }
        currentFile = f;
        fileInfo.textContent = f.name + " · " + (f.size >= 1048576 ? (f.size / 1048576).toFixed(2) + " MB" : (f.size / 1024).toFixed(1) + " KB");
        f.arrayBuffer().then(function (buf) { compute(new Uint8Array(buf), "文件 " + f.name); });
    }

    input.addEventListener("input", function () { clearTimeout(input._t); input._t = setTimeout(fromText, 250); });
    drop.onclick = function () { file.click(); };
    drop.onkeydown = function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); file.click(); } };
    file.onchange = function () { fromFile(file.files[0]); };
    ["dragover", "dragenter"].forEach(function (ev) { drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.add("over"); }); });
    ["dragleave", "drop"].forEach(function (ev) { drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.remove("over"); }); });
    drop.addEventListener("drop", function (e) { fromFile(e.dataTransfer.files[0]); });
    document.getElementById("clear").onclick = function () { input.value = ""; currentFile = null; file.value = ""; fileInfo.textContent = ""; fromText(); status.textContent = "已清空"; status.className = "hint"; };
    results.addEventListener("click", function (e) {
        var a = e.target.getAttribute && e.target.getAttribute("data-copy");
        if (!a) return;
        copyText(document.getElementById("h-" + a).textContent).then(function () { status.textContent = a + " 已复制"; status.className = "hint ok"; },
            function () { status.textContent = "复制失败，请手动选择复制"; status.className = "hint bad"; });
    });
    fromText();
})();
</script>
</body>
</html>

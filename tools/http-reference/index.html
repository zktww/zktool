<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HTTP 状态码与 MIME 速查 · zktool</title>
    <meta name="description" content="HTTP 状态码含义速查与常用 MIME 类型对照，支持搜索过滤。" />
    <meta name="theme-color" content="#f6f8fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1420" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="../../assets/tool-page.css" />
    <script src="../../assets/analytics.js"></script>
    <script src="../../assets/clipboard.js"></script>
    <style>
        .code-item { display:flex; gap:.7rem; align-items:baseline; padding:.55rem .7rem; border:1px solid var(--border); border-radius:10px; background:var(--surface); margin-bottom:.45rem; cursor:pointer; transition:border-color .2s; }
        .code-item:hover { border-color: var(--border-hover); }
        .code-item b { font-family:var(--mono); font-size:1rem; min-width:3ch; }
        .code-item .name { font-weight:650; }
        .code-item p { flex:1; min-width:0; margin:0; color:var(--text-2); font-size:.82rem; }
        .c2xx b { color:var(--ok); } .c3xx b { color:var(--brand); } .c4xx b { color:var(--warn); } .c5xx b { color:var(--danger); } .c1xx b { color:var(--text-3); }
        .tabs { margin-bottom: .9rem; }
    </style>
</head>
<body>
<div class="bg-fx" aria-hidden="true"></div>
<main class="wrap">
    <div class="top"><a class="back" href="../../">← 返回主页</a><p class="meta">HTTP / MIME</p></div>
    <h1><span class="title">HTTP 状态码与 MIME 速查</span></h1>
    <p class="lead">常用 HTTP 状态码含义与 MIME 类型对照，点击条目即可复制。</p>
    <section class="panel">
        <div class="row tabs">
            <button class="btn primary" id="tabStatus">状态码</button>
            <button class="btn" id="tabMime">MIME 类型</button>
            <input id="q" class="grow mono" type="search" placeholder="搜索：如 404 / 缓存 / json / 图片..." />
        </div>
        <div id="list"></div>
        <p class="hint" id="status">共 <span id="count"></span> 条 · 点击条目复制</p>
    </section>
</main>
<script>
(function () {
    "use strict";
    var HTTP = [
        [100,"Continue","客户端应继续发送请求体"],
        [101,"Switching Protocols","协议切换，常见于 WebSocket 握手"],
        [200,"OK","请求成功"],
        [201,"Created","资源创建成功，常见于 POST"],
        [202,"Accepted","已接受但尚未处理完成，适合异步任务"],
        [204,"No Content","成功但无返回体，常见于 DELETE / PUT"],
        [206,"Partial Content","范围请求成功，用于断点续传与视频拖动"],
        [301,"Moved Permanently","永久重定向，SEO 权重转移"],
        [302,"Found","临时重定向，方法可能被改为 GET"],
        [304,"Not Modified","协商缓存命中，配合 ETag / Last-Modified"],
        [307,"Temporary Redirect","临时重定向，保持原方法与请求体"],
        [308,"Permanent Redirect","永久重定向，保持原方法与请求体"],
        [400,"Bad Request","请求格式错误：参数、JSON 语法等"],
        [401,"Unauthorized","未认证：缺少或无效的凭证（如 Token 过期）"],
        [403,"Forbidden","已认证但无权限访问"],
        [404,"Not Found","资源不存在或路径错误"],
        [405,"Method Not Allowed","HTTP 方法不被允许，检查 GET/POST"],
        [408,"Request Timeout","服务器等待请求超时"],
        [409,"Conflict","资源冲突，常见于并发修改或重复创建"],
        [410,"Gone","资源已永久删除"],
        [413,"Payload Too Large","请求体过大，常见于文件上传超限"],
        [415,"Unsupported Media Type","Content-Type 不受支持"],
        [418,"I'm a teapot","茶壶拒绝煮咖啡（RFC 2324 彩蛋）"],
        [422,"Unprocessable Entity","语义校验失败，常见于表单验证错误"],
        [429,"Too Many Requests","触发限流，注意 Retry-After 响应头"],
        [431,"Request Header Fields Too Large","请求头过大，常见于 Cookie 膨胀"],
        [451,"Unavailable For Legal Reasons","因法律原因不可用"],
        [500,"Internal Server Error","服务器内部错误，查服务端日志"],
        [501,"Not Implemented","服务器不支持该功能"],
        [502,"Bad Gateway","网关收到上游无效响应，常见于后端挂了"],
        [503,"Service Unavailable","服务不可用：过载或维护中"],
        [504,"Gateway Timeout","网关等待上游超时，查上游耗时"],
        [505,"HTTP Version Not Supported","HTTP 版本不受支持"],
    ];
    var MIME = [
        ["text/html",".html","网页"],
        ["text/css",".css","样式表"],
        ["text/javascript",".js","JavaScript（规范推荐值）"],
        ["text/plain",".txt","纯文本"],
        ["text/csv",".csv","CSV 表格"],
        ["text/markdown",".md","Markdown"],
        ["application/json",".json","JSON 数据"],
        ["application/xml",".xml","XML 数据"],
        ["application/x-www-form-urlencoded","-","表单默认编码"],
        ["multipart/form-data","-","带文件的表单上传"],
        ["application/octet-stream",".bin","任意二进制流 / 强制下载"],
        ["application/pdf",".pdf","PDF 文档"],
        ["application/zip",".zip","ZIP 压缩包"],
        ["application/gzip",".gz","GZIP 压缩"],
        ["application/wasm",".wasm","WebAssembly"],
        ["image/png",".png","PNG 图片"],
        ["image/jpeg",".jpg .jpeg","JPEG 图片"],
        ["image/webp",".webp","WebP 图片"],
        ["image/avif",".avif","AVIF 图片"],
        ["image/gif",".gif","GIF 动图"],
        ["image/svg+xml",".svg","SVG 矢量图"],
        ["image/x-icon",".ico","网站图标"],
        ["audio/mpeg",".mp3","MP3 音频"],
        ["audio/ogg",".ogg","OGG 音频"],
        ["audio/wav",".wav","WAV 音频"],
        ["video/mp4",".mp4","MP4 视频"],
        ["video/webm",".webm","WebM 视频"],
        ["font/woff2",".woff2","WOFF2 字体（Web 首选）"],
        ["font/ttf",".ttf","TrueType 字体"],
        ["application/vnd.ms-excel",".xls","旧版 Excel"],
        ["application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",".xlsx","Excel 工作簿"],
        ["application/vnd.openxmlformats-officedocument.wordprocessingml.document",".docx","Word 文档"],
        ["text/event-stream","-","SSE 服务器推送"],
        ["application/x-ndjson",".ndjson","换行分隔 JSON 流"],
    ];
    var list = document.getElementById("list"), q = document.getElementById("q"), count = document.getElementById("count"), status = document.getElementById("status");
    var tabStatus = document.getElementById("tabStatus"), tabMime = document.getElementById("tabMime");
    var mode = "status";
    function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
    function render() {
        var kw = q.value.trim().toLowerCase(), rows, html;
        if (mode === "status") {
            rows = HTTP.filter(function (r) { return !kw || (r[0] + " " + r[1] + " " + r[2]).toLowerCase().indexOf(kw) >= 0; });
            html = rows.map(function (r) {
                return "<div class='code-item c" + Math.floor(r[0]/100) + "xx' data-copy='" + r[0] + " " + esc(r[1]) + "'><b>" + r[0] + "</b><span class='name'>" + esc(r[1]) + "</span><p>" + esc(r[2]) + "</p></div>";
            }).join("");
        } else {
            rows = MIME.filter(function (r) { return !kw || (r[0] + " " + r[1] + " " + r[2]).toLowerCase().indexOf(kw) >= 0; });
            html = rows.map(function (r) {
                return "<div class='code-item' data-copy='" + esc(r[0]) + "'><b class='mono' style='min-width:auto'>" + esc(r[1]) + "</b><span class='name mono'>" + esc(r[0]) + "</span><p>" + esc(r[2]) + "</p></div>";
            }).join("");
        }
        list.innerHTML = html || "<p class='hint'>没有匹配的条目</p>";
        count.textContent = rows.length;
    }
    function setMode(m) {
        mode = m;
        tabStatus.className = "btn" + (m === "status" ? " primary" : "");
        tabMime.className = "btn" + (m === "mime" ? " primary" : "");
        q.placeholder = m === "status" ? "搜索：如 404 / 缓存 / redirect..." : "搜索：如 json / 图片 / .woff2...";
        render();
    }
    tabStatus.onclick = function () { setMode("status"); };
    tabMime.onclick = function () { setMode("mime"); };
    q.addEventListener("input", render);
    list.addEventListener("click", function (e) {
        var item = e.target.closest("[data-copy]");
        if (!item) return;
        copyText(item.getAttribute("data-copy")).then(function () {
            status.innerHTML = "已复制：<span class='mono'>" + esc(item.getAttribute("data-copy")) + "</span>";
            status.className = "hint ok";
        }, function () { status.textContent = "复制失败，请手动选择复制"; status.className = "hint bad"; });
    });
    render();
})();
</script>
</body>
</html>

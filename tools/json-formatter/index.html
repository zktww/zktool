<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON 格式化工具 · zkdome</title>
    <meta name="description" content="校验、美化与压缩 JSON，支持缩进选项、键排序与一键复制。" />
    <meta name="theme-color" content="#0a0e17" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #0a0e17;
            --surface: #131c2e;
            --surface2: #1a2540;
            --text: #e0f7ff;
            --muted: #a0c8e0;
            --primary: #00eeff;
            --secondary: #ff00ea;
            --accent: #00ff9d;
            --danger: #ff6b8a;
            --border: rgba(0, 238, 255, 0.22);
            --radius: 14px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
            --scroll-track: rgba(19, 28, 46, 0.95);
            --scroll-thumb: rgba(0, 238, 255, 0.38);
            --scroll-thumb-hover: rgba(0, 238, 255, 0.58);
        }

        html {
            height: 100%;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100%;
            min-height: 100dvh;
            line-height: 1.55;
            display: flex;
            flex-direction: column;
            background-image:
                    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 238, 255, 0.1), transparent),
                    radial-gradient(circle at 100% 100%, rgba(255, 0, 234, 0.06), transparent 40%);
        }

        .wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            padding: clamp(1rem, 4vw, 2rem) clamp(1rem, 3vw, 1.5rem) clamp(1rem, 3vw, 1.75rem);
        }

        .top {
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem 0.9rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            transition: color 0.25s var(--ease), border-color 0.25s, transform 0.25s var(--ease);
        }

        .back:hover, .back:focus-visible {
            color: var(--text);
            border-color: rgba(0, 238, 255, 0.45);
            outline: none;
            transform: translateX(-2px);
        }

        .stat {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--muted);
            text-align: right;
        }

        .stat strong {
            color: var(--accent);
            font-weight: 600;
        }

        h1 {
            flex-shrink: 0;
            font-size: clamp(1.35rem, 4vw, 1.85rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(120deg, var(--text) 0%, var(--primary) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lead {
            flex-shrink: 0;
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .toolbar {
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.65rem;
            margin-bottom: 1rem;
        }

        .toolbar .grow {
            flex: 1;
            min-width: 0;
        }

        .field {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        select {
            font: inherit;
            font-size: 0.82rem;
            padding: 0.45rem 0.65rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: rgba(0, 238, 255, 0.55);
            box-shadow: 0 0 0 3px rgba(0, 238, 255, 0.12);
        }

        .chk {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.82rem;
            color: var(--muted);
            cursor: pointer;
            user-select: none;
        }

        .chk input {
            accent-color: var(--primary);
            width: 1rem;
            height: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.55rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0, 238, 255, 0.08);
            color: var(--primary);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s var(--ease);
        }

        .btn:hover, .btn:focus-visible {
            background: rgba(0, 238, 255, 0.15);
            border-color: rgba(0, 238, 255, 0.45);
            outline: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn--ghost {
            background: transparent;
            color: var(--muted);
        }

        .btn--ghost:hover, .btn--ghost:focus-visible {
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
        }

        .split {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 1rem;
            align-items: stretch;
        }

        @media (max-width: 820px) {
            .split {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        .pane {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .pane-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.45rem;
        }

        .pane-head span {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-weight: 600;
        }

        .copy {
            font-size: 0.75rem;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .copy:hover, .copy:focus-visible {
            color: var(--primary);
            border-color: rgba(0, 238, 255, 0.4);
            outline: none;
        }

        textarea {
            flex: 1;
            min-height: 0;
            width: 100%;
            resize: none;
            overflow: auto;
            font-family: var(--mono);
            font-size: 0.82rem;
            line-height: 1.45;
            padding: 0.85rem 0.95rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
        }

        textarea::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        textarea::-webkit-scrollbar-track {
            background: var(--scroll-track);
            border-radius: 999px;
            margin: 4px 0;
        }

        textarea::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--scroll-thumb-hover), var(--scroll-thumb));
            border-radius: 999px;
            border: 2px solid var(--scroll-track);
            background-clip: padding-box;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(0, 238, 255, 0.75), rgba(0, 238, 255, 0.45));
            border: 2px solid var(--scroll-track);
            background-clip: padding-box;
        }

        textarea::-webkit-scrollbar-corner {
            background: transparent;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(0, 238, 255, 0.55);
            box-shadow: 0 0 0 3px rgba(0, 238, 255, 0.1);
        }

        textarea::placeholder {
            color: rgba(160, 200, 224, 0.4);
        }

        #output {
            background: var(--surface2);
            color: var(--accent);
        }

        .err {
            flex-shrink: 0;
            font-size: 0.85rem;
            color: var(--danger);
            margin-top: 0.75rem;
            font-family: var(--mono);
            word-break: break-word;
        }

        .err[hidden] {
            display: none !important;
        }

        .ok {
            flex-shrink: 0;
            font-size: 0.85rem;
            color: var(--accent);
            margin-top: 0.75rem;
        }

        .ok[hidden] {
            display: none !important;
        }

        .hint {
            flex-shrink: 0;
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.85rem;
            opacity: 0.92;
        }

        footer {
            flex-shrink: 0;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.82rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <a class="back" href="../../index.html"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> 返回索引</a>
        <p class="stat" id="statLine" aria-live="polite">输入 <strong>0</strong> 字符</p>
    </div>

    <h1><i class="fa-solid fa-code" aria-hidden="true"></i> JSON 格式化</h1>
    <p class="lead">粘贴或编辑 JSON，一键美化或压缩；可选按键名排序，便于 diff 与对照。</p>

    <div class="toolbar" role="toolbar" aria-label="操作">
        <button type="button" class="btn" id="btnFormat"><i class="fa-solid fa-indent" aria-hidden="true"></i> 美化</button>
        <button type="button" class="btn" id="btnMinify"><i class="fa-solid fa-compress" aria-hidden="true"></i> 压缩</button>
        <span class="grow"></span>
        <label class="field">
            缩进
            <select id="indentSel" aria-label="缩进宽度">
                <option value="2" selected>2 空格</option>
                <option value="4">4 空格</option>
                <option value="tab">Tab</option>
            </select>
        </label>
        <label class="chk">
            <input type="checkbox" id="sortKeys" />
            键排序
        </label>
        <button type="button" class="btn btn--ghost" id="btnClear"><i class="fa-solid fa-eraser" aria-hidden="true"></i> 清空</button>
    </div>

    <div class="split">
        <div class="pane">
            <div class="pane-head">
                <span>输入</span>
                <button type="button" class="copy" id="copyIn">复制输入</button>
            </div>
            <label for="input" class="visually-hidden">JSON 输入</label>
            <textarea id="input" spellcheck="false" autocomplete="off" placeholder='例如 {"a":1,"b":[true,null]}'></textarea>
        </div>
        <div class="pane">
            <div class="pane-head">
                <span>结果</span>
                <button type="button" class="copy" id="copyOut">复制结果</button>
            </div>
            <label for="output" class="visually-hidden">格式化结果</label>
            <textarea id="output" readonly spellcheck="false" aria-readonly="true" placeholder="美化或压缩后的 JSON 将显示在这里"></textarea>
        </div>
    </div>

    <div id="errBox" class="err" hidden role="alert"></div>
    <div id="okBox" class="ok" hidden aria-live="polite"></div>
    <p class="hint">快捷键：<kbd style="font-family:var(--mono);border:1px solid var(--border);padding:0.1rem 0.35rem;border-radius:6px;background:var(--surface2)">Ctrl</kbd> + <kbd style="font-family:var(--mono);border:1px solid var(--border);padding:0.1rem 0.35rem;border-radius:6px;background:var(--surface2)">Enter</kbd> 美化当前输入。</p>

    <footer>仅使用浏览器原生 <code style="font-family:var(--mono);font-size:0.9em;color:var(--primary)">JSON.parse</code>，不支持 JSON5 / 尾逗号等非标准语法。</footer>
</div>

<style>
    .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }
</style>

<script>
    (function () {
        var input = document.getElementById("input");
        var output = document.getElementById("output");
        var indentSel = document.getElementById("indentSel");
        var sortKeys = document.getElementById("sortKeys");
        var errBox = document.getElementById("errBox");
        var okBox = document.getElementById("okBox");
        var statLine = document.getElementById("statLine");

        function showErr(msg) {
            if (msg) {
                errBox.textContent = msg;
                errBox.hidden = false;
            } else {
                errBox.textContent = "";
                errBox.hidden = true;
            }
            okBox.hidden = true;
        }

        function showOk(msg) {
            okBox.textContent = msg || "完成";
            okBox.hidden = false;
            errBox.hidden = true;
            setTimeout(function () {
                okBox.hidden = true;
            }, 1600);
        }

        function sortValueDeep(v) {
            if (v === null || typeof v !== "object") return v;
            if (Array.isArray(v)) {
                return v.map(sortValueDeep);
            }
            var keys = Object.keys(v).sort();
            var o = {};
            for (var i = 0; i < keys.length; i++) {
                o[keys[i]] = sortValueDeep(v[keys[i]]);
            }
            return o;
        }

        function getIndentUnit() {
            var v = indentSel.value;
            if (v === "tab") return "\t";
            var n = parseInt(v, 10);
            if (isNaN(n) || n < 1) n = 2;
            return new Array(n + 1).join(" ");
        }

        function parseInput() {
            var raw = input.value;
            var text = raw.replace(/^\uFEFF/, "").trim();
            if (!text) {
                showErr("请输入 JSON 文本。");
                return null;
            }
            try {
                return JSON.parse(text);
            } catch (e) {
                showErr(String(e && e.message ? e.message : e));
                return null;
            }
        }

        function stringifyPretty(data) {
            var space = getIndentUnit();
            return JSON.stringify(data, null, space);
        }

        function stringifyMin(data) {
            return JSON.stringify(data);
        }

        function formatPretty() {
            var data = parseInput();
            if (data === null) {
                output.value = "";
                return;
            }
            if (sortKeys.checked) data = sortValueDeep(data);
            output.value = stringifyPretty(data);
            showErr("");
            showOk("已美化");
        }

        function formatMinify() {
            var data = parseInput();
            if (data === null) {
                output.value = "";
                return;
            }
            if (sortKeys.checked) data = sortValueDeep(data);
            output.value = stringifyMin(data);
            showErr("");
            showOk("已压缩");
        }

        function copyText(text) {
            if (!text) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function () {
                    showOk("已复制到剪贴板");
                });
            } else {
                var ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand("copy");
                    showOk("已复制到剪贴板");
                } catch (e) {
                    showErr("复制失败，请手动全选复制。");
                }
                document.body.removeChild(ta);
            }
        }

        document.getElementById("btnFormat").addEventListener("click", formatPretty);
        document.getElementById("btnMinify").addEventListener("click", formatMinify);
        document.getElementById("btnClear").addEventListener("click", function () {
            input.value = "";
            output.value = "";
            showErr("");
            okBox.hidden = true;
            updateStat();
            input.focus();
        });

        document.getElementById("copyIn").addEventListener("click", function () {
            if (!input.value) {
                showErr("输入为空。");
                return;
            }
            copyText(input.value);
        });
        document.getElementById("copyOut").addEventListener("click", function () {
            if (!output.value) {
                showErr("结果为空，请先美化或压缩。");
                return;
            }
            copyText(output.value);
        });

        document.addEventListener("keydown", function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                if (document.activeElement === input) {
                    e.preventDefault();
                    formatPretty();
                }
            }
        });

        function updateStat() {
            var n = input.value.length;
            statLine.innerHTML = "输入 <strong>" + n + "</strong> 字符";
        }

        input.addEventListener("input", updateStat);
        updateStat();
    })();
</script>
</body>
</html>

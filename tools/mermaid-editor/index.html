<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermaid 图表编辑器 · zktool</title>
    <meta name="description" content="实时编辑 Mermaid 代码，即时预览流程图、时序图、甘特图等图表，支持缩放平移与导出 PNG/SVG。" />
    <meta name="theme-color" content="#0a0e17" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #0a0e17;
            --surface: #131c2e;
            --surface2: #1a2540;
            --text: #e0f7ff;
            --muted: #a0c8e0;
            --primary: #00eeff;
            --secondary: #ff00ea;
            --accent: #00ff9d;
            --danger: #ff6b8a;
            --border: rgba(0, 238, 255, 0.22);
            --radius: 14px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
            --scroll-track: rgba(19, 28, 46, 0.95);
            --scroll-thumb: rgba(0, 238, 255, 0.38);
            --scroll-thumb-hover: rgba(0, 238, 255, 0.58);
        }

        html { height: 100%; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100%;
            height: 100dvh;
            line-height: 1.55;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 238, 255, 0.1), transparent),
                    radial-gradient(circle at 100% 100%, rgba(255, 0, 234, 0.06), transparent 40%);
        }

        .wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: clamp(0.85rem, 2.5vw, 1.5rem) clamp(1rem, 3vw, 1.5rem) clamp(0.85rem, 2vw, 1.25rem);
        }

        /* ---------- 顶部 ---------- */
        .top {
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.85rem 1rem;
            margin-bottom: 1rem;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem 0.9rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            transition: color 0.25s var(--ease), border-color 0.25s, transform 0.25s var(--ease);
        }

        .back:hover, .back:focus-visible {
            color: var(--text);
            border-color: rgba(0, 238, 255, 0.45);
            outline: none;
            transform: translateX(-2px);
        }

        h1 {
            font-size: clamp(1.2rem, 3vw, 1.55rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(120deg, var(--text) 0%, var(--primary) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lead {
            flex-basis: 100%;
            color: var(--muted);
            font-size: 0.88rem;
            margin-top: -0.35rem;
        }

        /* ---------- 工具栏 ---------- */
        .toolbar {
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.85rem;
        }

        .toolbar .grow { flex: 1; min-width: 0; }

        .field {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        select {
            font: inherit;
            font-size: 0.82rem;
            padding: 0.45rem 0.65rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: rgba(0, 238, 255, 0.55);
            box-shadow: 0 0 0 3px rgba(0, 238, 255, 0.12);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem 0.95rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0, 238, 255, 0.08);
            color: var(--primary);
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, border-color 0.2s, transform 0.2s var(--ease);
        }

        .btn:hover, .btn:focus-visible {
            background: rgba(0, 238, 255, 0.15);
            border-color: rgba(0, 238, 255, 0.45);
            outline: none;
        }

        .btn:active { transform: scale(0.97); }

        .btn--ghost { background: transparent; color: var(--muted); }

        .btn--ghost:hover, .btn--ghost:focus-visible {
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn--accent {
            background: rgba(0, 255, 157, 0.08);
            color: var(--accent);
            border-color: rgba(0, 255, 157, 0.22);
        }

        .btn--accent:hover, .btn--accent:focus-visible {
            background: rgba(0, 255, 157, 0.15);
            border-color: rgba(0, 255, 157, 0.45);
        }

        /* 小图标按钮（面板头部用） */
        .ibtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            font-size: 0.78rem;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .ibtn:hover, .ibtn:focus-visible {
            color: var(--primary);
            background: rgba(0, 238, 255, 0.1);
            border-color: var(--border);
            outline: none;
        }

        .zoom-val {
            min-width: 3.2em;
            text-align: center;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--muted);
            user-select: none;
        }

        /* ---------- 分栏布局 ---------- */
        .split {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 8px 1fr;
            align-items: stretch;
        }

        .divider {
            cursor: col-resize;
            position: relative;
            touch-action: none;
        }

        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 44px;
            border-radius: 999px;
            background: var(--border);
            transition: background 0.2s, height 0.2s var(--ease);
        }

        .divider:hover::after, .divider.dragging::after {
            background: rgba(0, 238, 255, 0.6);
            height: 72px;
        }

        /* ---------- 面板（卡片式） ---------- */
        .pane {
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            overflow: hidden;
        }

        .pane-head {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            background: rgba(26, 37, 64, 0.55);
            min-height: 42px;
        }

        .pane-title {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .pane-head .spacer { flex: 1; }

        .char-count {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            opacity: 0.75;
            white-space: nowrap;
        }

        /* 状态指示 */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            opacity: 0.5;
        }

        .status.is-ok .dot { background: var(--accent); opacity: 1; box-shadow: 0 0 6px rgba(0, 255, 157, 0.6); }
        .status.is-err .dot { background: var(--danger); opacity: 1; box-shadow: 0 0 6px rgba(255, 107, 138, 0.6); }
        .status.is-busy .dot { background: var(--primary); opacity: 1; animation: pulse 0.9s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ---------- 编辑器 ---------- */
        textarea {
            flex: 1;
            min-height: 0;
            width: 100%;
            resize: none;
            overflow: auto;
            font-family: var(--mono);
            font-size: 0.82rem;
            line-height: 1.55;
            padding: 0.85rem 0.95rem;
            border: none;
            background: transparent;
            color: var(--text);
            tab-size: 4;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
        }

        textarea:focus { outline: none; }

        .pane:focus-within {
            border-color: rgba(0, 238, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 238, 255, 0.08);
        }

        textarea::placeholder { color: rgba(160, 200, 224, 0.4); }

        textarea::-webkit-scrollbar, .preview-box::-webkit-scrollbar { width: 10px; height: 10px; }
        textarea::-webkit-scrollbar-track, .preview-box::-webkit-scrollbar-track {
            background: var(--scroll-track);
            border-radius: 999px;
            margin: 4px 0;
        }
        textarea::-webkit-scrollbar-thumb, .preview-box::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--scroll-thumb-hover), var(--scroll-thumb));
            border-radius: 999px;
            border: 2px solid var(--scroll-track);
            background-clip: padding-box;
        }
        textarea::-webkit-scrollbar-thumb:hover, .preview-box::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(0, 238, 255, 0.75), rgba(0, 238, 255, 0.45));
            border: 2px solid var(--scroll-track);
            background-clip: padding-box;
        }
        textarea::-webkit-scrollbar-corner, .preview-box::-webkit-scrollbar-corner { background: transparent; }

        /* ---------- 预览 ---------- */
        .preview-pane.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 60;
            border-radius: 0;
            background: var(--bg);
        }

        .preview-box {
            flex: 1;
            min-height: 0;
            overflow: auto;
            display: flex;
            padding: 1.25rem;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--scroll-track);
        }

        .preview-box.pannable { cursor: grab; }
        .preview-box.panning { cursor: grabbing; user-select: none; }

        .stage { margin: auto; }

        .stage svg { display: block; max-width: none; height: auto; }

        .preview-placeholder {
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.9rem;
            gap: 0.75rem;
            opacity: 0.6;
            text-align: center;
        }

        .preview-placeholder i {
            font-size: 2.5rem;
            color: var(--primary);
            opacity: 0.4;
        }

        /* 错误条：覆盖在预览底部，不打断上一次成功的图 */
        .err-bar {
            flex-shrink: 0;
            font-size: 0.78rem;
            color: var(--danger);
            font-family: var(--mono);
            padding: 0.5rem 0.85rem;
            border-top: 1px solid rgba(255, 107, 138, 0.3);
            background: rgba(255, 107, 138, 0.07);
            max-height: 5.6em;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .err-bar[hidden] { display: none !important; }

        /* ---------- 提示 toast ---------- */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 2rem;
            transform: translate(-50%, 8px);
            z-index: 80;
            padding: 0.55rem 1.1rem;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 157, 0.35);
            background: rgba(10, 20, 25, 0.92);
            color: var(--accent);
            font-size: 0.85rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s var(--ease);
        }

        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        .toast.toast--err {
            border-color: rgba(255, 107, 138, 0.4);
            color: var(--danger);
        }

        /* ---------- 底部 ---------- */
        footer {
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem 1.25rem;
            margin-top: 0.85rem;
            font-size: 0.78rem;
            color: var(--muted);
            opacity: 0.85;
        }

        footer code, kbd {
            font-family: var(--mono);
            font-size: 0.9em;
            color: var(--primary);
        }

        kbd {
            border: 1px solid var(--border);
            padding: 0.05rem 0.35rem;
            border-radius: 6px;
            background: var(--surface2);
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ---------- 移动端 ---------- */
        @media (max-width: 820px) {
            body { overflow: auto; }

            .split {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(240px, 45vh) minmax(300px, 55vh);
                gap: 0.85rem;
            }

            .divider { display: none; }

            .lead { display: none; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
        if (typeof mermaid === 'undefined') {
            var s = document.createElement('script');
            s.src = 'https://unpkg.com/mermaid@11/dist/mermaid.min.js';
            document.head.appendChild(s);
        }
    </script>
    <script src="../../assets/analytics.js"></script>
</head>
<body>
<div class="wrap">
    <div class="top">
        <a class="back" href="../../index.html"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> 返回索引</a>
        <h1><i class="fa-solid fa-diagram-project" aria-hidden="true"></i> Mermaid 图表编辑器</h1>
        <p class="lead">左侧编写 Mermaid 语法，右侧实时渲染；内容自动保存在本地，支持缩放、平移与导出。</p>
    </div>

    <div class="toolbar" role="toolbar" aria-label="操作">
        <label class="field">
            示例模板
            <select id="exampleSel" aria-label="选择示例模板">
                <option value="">-- 选择 --</option>
                <option value="flowchart">流程图</option>
                <option value="sequence">时序图</option>
                <option value="gantt">甘特图</option>
                <option value="class">类图</option>
                <option value="state">状态图</option>
                <option value="er">ER 图</option>
                <option value="pie">饼图</option>
                <option value="mindmap">思维导图</option>
                <option value="git">Git 图</option>
            </select>
        </label>
        <span class="grow"></span>
        <button type="button" class="btn btn--ghost" id="btnCopy"><i class="fa-regular fa-copy" aria-hidden="true"></i> 复制代码</button>
        <button type="button" class="btn btn--ghost" id="btnClear"><i class="fa-solid fa-eraser" aria-hidden="true"></i> 清空</button>
        <button type="button" class="btn btn--accent" id="btnSvg"><i class="fa-solid fa-file-code" aria-hidden="true"></i> 下载 SVG</button>
        <button type="button" class="btn btn--accent" id="btnPng"><i class="fa-solid fa-image" aria-hidden="true"></i> 下载 PNG</button>
    </div>

    <div class="split" id="split">
        <section class="pane" aria-label="代码编辑">
            <div class="pane-head">
                <span class="pane-title"><i class="fa-solid fa-code" aria-hidden="true"></i> Mermaid 代码</span>
                <span class="spacer"></span>
                <span class="char-count" id="charCount"></span>
            </div>
            <label for="editor" class="visually-hidden">Mermaid 代码输入</label>
            <textarea id="editor" spellcheck="false" autocomplete="off" placeholder="在此输入 Mermaid 代码，例如：&#10;graph TD&#10;    A[开始] --> B[结束]"></textarea>
        </section>

        <div class="divider" id="divider" role="separator" aria-orientation="vertical" aria-label="拖动调整分栏宽度"></div>

        <section class="pane preview-pane" id="previewPane" aria-label="图表预览">
            <div class="pane-head">
                <span class="pane-title"><i class="fa-solid fa-eye" aria-hidden="true"></i> 预览</span>
                <span class="status" id="status"><span class="dot"></span><span id="statusText">等待输入</span></span>
                <span class="spacer"></span>
                <button type="button" class="ibtn" id="btnZoomOut" title="缩小" aria-label="缩小"><i class="fa-solid fa-minus" aria-hidden="true"></i></button>
                <span class="zoom-val" id="zoomVal">100%</span>
                <button type="button" class="ibtn" id="btnZoomIn" title="放大" aria-label="放大"><i class="fa-solid fa-plus" aria-hidden="true"></i></button>
                <button type="button" class="ibtn" id="btnFit" title="适应窗口" aria-label="适应窗口"><i class="fa-solid fa-compress" aria-hidden="true"></i></button>
                <button type="button" class="ibtn" id="btnFull" title="全屏预览 (Esc 退出)" aria-label="全屏预览"><i class="fa-solid fa-expand" aria-hidden="true"></i></button>
            </div>
            <div class="preview-box" id="previewBox">
                <div class="preview-placeholder" id="placeholder">
                    <i class="fa-solid fa-diagram-project" aria-hidden="true"></i>
                    <span>在左侧输入代码后自动渲染<br>也可以从上方选择一个示例模板</span>
                </div>
                <div class="stage" id="stage" hidden></div>
            </div>
            <div class="err-bar" id="errBar" hidden role="alert"></div>
        </section>
    </div>

    <footer>
        <span>基于 <code>mermaid.js</code>，支持流程图、时序图、甘特图、类图、状态图、ER 图、饼图、思维导图等。</span>
        <span><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 立即渲染 · <kbd>Ctrl</kbd>+<kbd>S</kbd> 下载 SVG · <kbd>Ctrl</kbd>+滚轮缩放预览</span>
    </footer>
</div>

<div class="toast" id="toast" aria-live="polite"></div>

<script>
    (function () {
        "use strict";

        var $ = function (id) { return document.getElementById(id); };

        var editor = $("editor");
        var stage = $("stage");
        var placeholder = $("placeholder");
        var previewBox = $("previewBox");
        var previewPane = $("previewPane");
        var errBar = $("errBar");
        var statusEl = $("status");
        var statusText = $("statusText");
        var charCount = $("charCount");
        var zoomVal = $("zoomVal");
        var toast = $("toast");

        if (typeof mermaid === "undefined") {
            placeholder.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:var(--danger)" aria-hidden="true"></i><span>Mermaid 库加载失败，请检查网络连接后刷新页面</span>';
            return;
        }

        /* ================= 配置 ================= */

        var STORAGE_KEY = "zktool.mermaid.code";
        var DEBOUNCE_MS = 450;
        var ZOOM_MIN = 0.2, ZOOM_MAX = 4, ZOOM_STEP = 0.2;

        mermaid.initialize({
            startOnLoad: false,
            theme: "dark",
            // 关闭 htmlLabels：纯 SVG 文本标签才能被 canvas 安全绘制，保证 PNG 导出可用
            flowchart: { htmlLabels: false },
            class: { htmlLabels: false },
            themeVariables: {
                darkMode: true,
                background: "#131c2e",
                primaryColor: "#1a2540",
                primaryTextColor: "#e0f7ff",
                primaryBorderColor: "rgba(0, 238, 255, 0.35)",
                lineColor: "rgba(0, 238, 255, 0.5)",
                secondaryColor: "#1e2d4a",
                tertiaryColor: "#0a0e17",
                noteBkgColor: "#1a2540",
                noteTextColor: "#e0f7ff",
                noteBorderColor: "rgba(0, 238, 255, 0.35)",
                textColor: "#e0f7ff",
                mainBkg: "#1a2540",
                nodeBorder: "rgba(0, 238, 255, 0.35)",
                clusterBkg: "rgba(19, 28, 46, 0.8)",
                clusterBorder: "rgba(0, 238, 255, 0.2)",
                titleColor: "#e0f7ff",
                edgeLabelBackground: "#131c2e",
                fontSize: 14
            },
            securityLevel: "strict",
            fontFamily: '"Segoe UI", system-ui, -apple-system, sans-serif'
        });

        var EXAMPLES = {
            flowchart: "graph TD\n    A[用户访问] --> B{是否已登录?}\n    B -->|是| C[显示主页]\n    B -->|否| D[跳转登录]\n    D --> E[输入账号密码]\n    E --> F{验证成功?}\n    F -->|是| C\n    F -->|否| G[提示错误]\n    G --> E\n    C --> H[用户操作]\n    H --> I[退出登录]\n    I --> D",
            sequence: "sequenceDiagram\n    participant 浏览器\n    participant 服务器\n    participant 数据库\n    浏览器->>服务器: POST /api/login\n    服务器->>数据库: 查询用户\n    数据库-->>服务器: 返回用户信息\n    服务器-->>浏览器: 200 OK + Token\n    浏览器->>服务器: GET /api/user (Token)\n    服务器->>数据库: 查询用户详情\n    数据库-->>服务器: 返回用户详情\n    服务器-->>浏览器: 200 OK + 用户数据",
            gantt: "gantt\n    title 项目开发计划\n    dateFormat  YYYY-MM-DD\n    section 需求阶段\n    需求调研       :a1, 2026-01-01, 14d\n    需求评审       :a2, after a1, 3d\n    section 设计阶段\n    原型设计       :b1, after a2, 10d\n    UI 设计        :b2, after b1, 8d\n    section 开发阶段\n    前端开发       :c1, after b2, 21d\n    后端开发       :c2, after b2, 21d\n    section 测试阶段\n    集成测试       :d1, after c1, 7d\n    上线部署       :d2, after d1, 2d",
            "class": "classDiagram\n    class Animal {\n        +String name\n        +int age\n        +makeSound()\n    }\n    class Dog {\n        +String breed\n        +fetch()\n        +bark()\n    }\n    class Cat {\n        +String color\n        +purr()\n        +scratch()\n    }\n    class Owner {\n        +String name\n        +adopt(Animal)\n    }\n    Animal <|-- Dog\n    Animal <|-- Cat\n    Owner \"1\" --> \"*\" Animal : 拥有",
            state: "stateDiagram-v2\n    [*] --> 待处理\n    待处理 --> 进行中 : 开始处理\n    进行中 --> 已完成 : 处理完成\n    进行中 --> 已挂起 : 暂停\n    已挂起 --> 进行中 : 恢复\n    已挂起 --> 已取消 : 取消\n    已完成 --> [*]\n    已取消 --> [*]\n    待处理 --> 已取消 : 取消",
            er: "erDiagram\n    USER ||--o{ ORDER : 下单\n    ORDER ||--|{ ORDER_ITEM : 包含\n    PRODUCT ||--o{ ORDER_ITEM : 关联\n    USER {\n        int id PK\n        string name\n        string email\n    }\n    ORDER {\n        int id PK\n        int user_id FK\n        datetime created_at\n    }\n    ORDER_ITEM {\n        int order_id FK\n        int product_id FK\n        int quantity\n    }\n    PRODUCT {\n        int id PK\n        string title\n        decimal price\n    }",
            pie: "pie title 编程语言使用占比\n    \"JavaScript\" : 35\n    \"TypeScript\" : 25\n    \"Python\" : 20\n    \"Go\" : 10\n    \"Rust\" : 5\n    \"其他\" : 5",
            mindmap: "mindmap\n  root((前端技术栈))\n    基础\n      HTML\n      CSS\n      JavaScript\n    框架\n      Vue\n      React\n    工程化\n      Vite\n      TypeScript\n      ESLint\n    可视化\n      Canvas\n      SVG\n      WebGL",
            git: "gitGraph\n    commit id: \"init\"\n    branch develop\n    commit id: \"feat-a\"\n    commit id: \"feat-b\"\n    checkout main\n    merge develop tag: \"v1.0\"\n    branch hotfix\n    commit id: \"fix-1\"\n    checkout main\n    merge hotfix tag: \"v1.0.1\""
        };

        /* ================= 状态与提示 ================= */

        var toastTimer = null;
        function showToast(msg, isErr) {
            toast.textContent = msg;
            toast.classList.toggle("toast--err", !!isErr);
            toast.classList.add("show");
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function () { toast.classList.remove("show"); }, 1800);
        }

        function setStatus(state, text) {
            statusEl.className = "status" + (state ? " is-" + state : "");
            statusText.textContent = text;
        }

        function setError(msg) {
            if (msg) {
                errBar.textContent = msg;
                errBar.hidden = false;
            } else {
                errBar.textContent = "";
                errBar.hidden = true;
            }
        }

        function updateCharCount() {
            var v = editor.value;
            var lines = v ? v.split("\n").length : 0;
            charCount.textContent = lines + " 行 · " + v.length + " 字符";
        }

        /* ================= 渲染 ================= */

        var renderSeq = 0;
        var debounceTimer = null;
        var baseW = 0, baseH = 0;
        var zoom = 1;

        function renderNow() {
            var code = editor.value.trim();
            renderSeq++;
            var seq = renderSeq;
            var id = "mermaid-render-" + seq;

            if (!code) {
                stage.innerHTML = "";
                stage.hidden = true;
                placeholder.style.display = "";
                setError("");
                setStatus("", "等待输入");
                return;
            }

            setStatus("busy", "渲染中…");
            var t0 = performance.now();

            mermaid.render(id, code).then(function (result) {
                if (seq !== renderSeq) return; // 已有更新的渲染请求，丢弃本次结果
                stage.innerHTML = result.svg;
                stage.hidden = false;
                placeholder.style.display = "none";
                setError("");

                var svgEl = stage.querySelector("svg");
                measureBase(svgEl);
                fitZoom(true);

                var ms = Math.round(performance.now() - t0);
                setStatus("ok", "已渲染 · " + ms + "ms");
            }).catch(function (err) {
                // mermaid 渲染失败时可能向 body 注入残留节点，清理掉
                var ghost = document.getElementById("d" + id) || document.getElementById(id);
                if (ghost) ghost.remove();
                if (seq !== renderSeq) return;
                // 保留上一次成功的图，只在底部提示错误
                var msg = err && err.message ? err.message : String(err);
                setError(msg.split("\n").slice(0, 4).join("\n"));
                setStatus("err", "语法错误");
            });
        }

        function scheduleRender() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(renderNow, DEBOUNCE_MS);
        }

        /* ================= 缩放与平移 ================= */

        function measureBase(svgEl) {
            baseW = 0; baseH = 0;
            if (!svgEl) return;
            try {
                var vb = svgEl.viewBox && svgEl.viewBox.baseVal;
                if (vb && vb.width > 0) { baseW = vb.width; baseH = vb.height; }
            } catch (e) { /* ignore */ }
            if (!baseW) {
                var box = svgEl.getBoundingClientRect();
                baseW = box.width || 600;
                baseH = box.height || 400;
            }
        }

        function applyZoom() {
            var svgEl = stage.querySelector("svg");
            if (!svgEl || !baseW) return;
            svgEl.style.width = Math.round(baseW * zoom) + "px";
            svgEl.style.height = "auto";
            zoomVal.textContent = Math.round(zoom * 100) + "%";
            var overflow = stage.scrollWidth > previewBox.clientWidth || stage.scrollHeight > previewBox.clientHeight;
            previewBox.classList.toggle("pannable", overflow);
        }

        function setZoom(z) {
            zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z));
            applyZoom();
        }

        // 适应窗口：图比窗口大则缩小到刚好放下，否则 100%
        function fitZoom(onlyShrink) {
            if (!baseW) return;
            var pad = 48;
            var fit = Math.min(
                (previewBox.clientWidth - pad) / baseW,
                (previewBox.clientHeight - pad) / baseH
            );
            var target = onlyShrink ? Math.min(1, fit) : fit;
            setZoom(target);
        }

        $("btnZoomIn").addEventListener("click", function () { setZoom(zoom + ZOOM_STEP); });
        $("btnZoomOut").addEventListener("click", function () { setZoom(zoom - ZOOM_STEP); });
        $("btnFit").addEventListener("click", function () { fitZoom(false); });

        previewBox.addEventListener("wheel", function (e) {
            if (!e.ctrlKey && !e.metaKey) return;
            e.preventDefault();
            setZoom(zoom * (e.deltaY < 0 ? 1.12 : 0.9));
        }, { passive: false });

        // 拖拽平移（内容溢出时）
        var pan = null;
        previewBox.addEventListener("pointerdown", function (e) {
            if (e.button !== 0 || !previewBox.classList.contains("pannable")) return;
            pan = { x: e.clientX, y: e.clientY, left: previewBox.scrollLeft, top: previewBox.scrollTop };
            previewBox.classList.add("panning");
            previewBox.setPointerCapture(e.pointerId);
        });
        previewBox.addEventListener("pointermove", function (e) {
            if (!pan) return;
            previewBox.scrollLeft = pan.left - (e.clientX - pan.x);
            previewBox.scrollTop = pan.top - (e.clientY - pan.y);
        });
        function endPan() { pan = null; previewBox.classList.remove("panning"); }
        previewBox.addEventListener("pointerup", endPan);
        previewBox.addEventListener("pointercancel", endPan);

        /* ================= 全屏预览 ================= */

        var fullBtn = $("btnFull");
        function toggleFull(force) {
            var on = typeof force === "boolean" ? force : !previewPane.classList.contains("fullscreen");
            previewPane.classList.toggle("fullscreen", on);
            fullBtn.querySelector("i").className = on ? "fa-solid fa-compress" : "fa-solid fa-expand";
            fullBtn.title = on ? "退出全屏 (Esc)" : "全屏预览 (Esc 退出)";
            fitZoom(true);
        }
        fullBtn.addEventListener("click", function () { toggleFull(); });

        /* ================= 导出 ================= */

        function downloadBlob(blob, filename) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function () { URL.revokeObjectURL(url); }, 200);
        }

        function fileStamp() {
            var d = new Date();
            function p(n) { return (n < 10 ? "0" : "") + n; }
            return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) + "-" + p(d.getHours()) + p(d.getMinutes());
        }

        // 导出用：克隆 SVG，去掉页面上的缩放样式，补齐尺寸与命名空间
        function exportableSvg() {
            var svgEl = stage.querySelector("svg");
            if (!svgEl || stage.hidden) return null;
            var clone = svgEl.cloneNode(true);
            clone.removeAttribute("style");
            clone.setAttribute("width", Math.max(1, Math.round(baseW)));
            clone.setAttribute("height", Math.max(1, Math.round(baseH)));
            if (!clone.getAttribute("xmlns")) clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
            return new XMLSerializer().serializeToString(clone);
        }

        $("btnSvg").addEventListener("click", function () {
            var data = exportableSvg();
            if (!data) { showToast("请先渲染一个图表", true); return; }
            downloadBlob(new Blob([data], { type: "image/svg+xml;charset=utf-8" }), "mermaid-" + fileStamp() + ".svg");
            showToast("SVG 已下载");
        });

        $("btnPng").addEventListener("click", function () {
            var data = exportableSvg();
            if (!data) { showToast("请先渲染一个图表", true); return; }

            var scale = 2;
            var w = Math.max(1, Math.round(baseW)), h = Math.max(1, Math.round(baseH));
            var img = new Image();

            img.onload = function () {
                try {
                    var canvas = document.createElement("canvas");
                    canvas.width = w * scale;
                    canvas.height = h * scale;
                    var ctx = canvas.getContext("2d");
                    ctx.fillStyle = "#131c2e";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(function (blob) {
                        if (blob) {
                            downloadBlob(blob, "mermaid-" + fileStamp() + ".png");
                            showToast("PNG 已下载");
                        } else {
                            showToast("PNG 导出失败，请改用 SVG", true);
                        }
                    }, "image/png");
                } catch (e) {
                    showToast("PNG 导出失败，请改用 SVG", true);
                }
            };
            img.onerror = function () { showToast("PNG 导出失败，请改用 SVG", true); };
            img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(data);
        });

        $("btnCopy").addEventListener("click", function () {
            var code = editor.value;
            if (!code.trim()) { showToast("没有可复制的内容", true); return; }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(function () {
                    showToast("代码已复制");
                }, function () {
                    showToast("复制失败", true);
                });
            } else {
                editor.select();
                document.execCommand("copy");
                showToast("代码已复制");
            }
        });

        /* ================= 编辑器行为 ================= */

        editor.addEventListener("input", function () {
            updateCharCount();
            try { localStorage.setItem(STORAGE_KEY, editor.value); } catch (e) { /* ignore */ }
            scheduleRender();
        });

        // Tab 缩进（保留撤销栈）
        editor.addEventListener("keydown", function (e) {
            if (e.key === "Tab" && !e.ctrlKey && !e.metaKey && !e.altKey) {
                e.preventDefault();
                if (!document.execCommand || !document.execCommand("insertText", false, "    ")) {
                    var start = editor.selectionStart;
                    editor.setRangeText("    ", start, editor.selectionEnd, "end");
                    editor.dispatchEvent(new Event("input"));
                }
            }
        });

        document.addEventListener("keydown", function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                e.preventDefault();
                if (debounceTimer) clearTimeout(debounceTimer);
                renderNow();
            } else if ((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "S")) {
                e.preventDefault();
                $("btnSvg").click();
            } else if (e.key === "Escape" && previewPane.classList.contains("fullscreen")) {
                toggleFull(false);
            }
        });

        $("exampleSel").addEventListener("change", function () {
            var val = this.value;
            if (val && EXAMPLES[val]) {
                editor.value = EXAMPLES[val];
                editor.dispatchEvent(new Event("input"));
                if (debounceTimer) clearTimeout(debounceTimer);
                renderNow();
            }
            this.value = "";
        });

        $("btnClear").addEventListener("click", function () {
            editor.value = "";
            editor.dispatchEvent(new Event("input"));
            if (debounceTimer) clearTimeout(debounceTimer);
            renderNow();
            editor.focus();
        });

        /* ================= 分栏拖拽 ================= */

        var split = $("split");
        var divider = $("divider");

        divider.addEventListener("pointerdown", function (e) {
            e.preventDefault();
            divider.classList.add("dragging");
            divider.setPointerCapture(e.pointerId);

            function onMove(ev) {
                var rect = split.getBoundingClientRect();
                var pct = ((ev.clientX - rect.left) / rect.width) * 100;
                pct = Math.min(75, Math.max(25, pct));
                split.style.gridTemplateColumns = pct + "fr 8px " + (100 - pct) + "fr";
            }
            function onUp(ev) {
                divider.classList.remove("dragging");
                divider.releasePointerCapture(ev.pointerId);
                divider.removeEventListener("pointermove", onMove);
                divider.removeEventListener("pointerup", onUp);
                fitZoom(true);
            }
            divider.addEventListener("pointermove", onMove);
            divider.addEventListener("pointerup", onUp);
        });

        window.addEventListener("resize", function () {
            if (!stage.hidden) applyZoom();
        });

        /* ================= 初始化 ================= */

        var saved = null;
        try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) { /* ignore */ }
        editor.value = saved !== null && saved.trim() !== "" ? saved : EXAMPLES.flowchart;
        updateCharCount();
        renderNow();
    })();
</script>

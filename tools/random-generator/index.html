<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>随机 ID 生成器 · zktool</title>
    <meta name="description" content="生成 UUID v4、随机密码、Token、数字串与批量随机字符串。" />
    <meta name="theme-color" content="#f6f8fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1420" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="../../assets/tool-page.css" />
    <script src="../../assets/analytics.js"></script>
    <script src="../../assets/clipboard.js"></script>
</head>
<body>
<div class="bg-fx" aria-hidden="true"></div>
<main class="wrap">
    <div class="top"><a class="back" href="../../">← 返回主页</a><p class="meta">UUID / Random</p></div>
    <h1><span class="title">随机 ID 生成器</span></h1>
    <p class="lead">用浏览器 Crypto API 生成 UUID、密码、Token 和批量随机字符串。</p>
    <div class="tool-grid">
        <section class="panel">
            <h2>配置</h2>
            <div class="row"><label class="grow">类型<select id="type"><option value="uuid">UUID v4</option><option value="password">密码</option><option value="token">Token</option><option value="number">数字串</option><option value="custom">自定义字符集</option></select></label><label class="w-8">长度<input id="len" type="number" min="1" max="512" value="32" /></label><label class="w-8">数量<input id="count" type="number" min="1" max="200" value="10" /></label></div>
            <label>自定义字符集</label>
            <input id="charset" class="mono" value="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789" />
            <div class="row"><button class="btn primary" id="gen">生成</button><button class="btn" id="copy">复制全部</button><button class="btn danger" id="clear">清空</button></div>
        </section>
        <aside>
            <section class="panel"><h2>结果</h2><pre class="output" id="output"></pre><p class="hint" id="status"></p></section>
            <section class="panel"><h2>字符集</h2><div class="chips" id="chips"></div></section>
        </aside>
    </div>
</main>
<script>
(function () {
    "use strict";
    var type = document.getElementById("type"), len = document.getElementById("len"), count = document.getElementById("count"), charset = document.getElementById("charset"), output = document.getElementById("output"), status = document.getElementById("status"), chips = document.getElementById("chips");
    var sets = { password: "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*", token: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_", number: "0123456789" };
    function randInt(max) {
        // 拒绝采样：丢弃会导致取模偏差的高位区间
        var limit = Math.floor(4294967296 / max) * max;
        var a = new Uint32Array(1);
        do { crypto.getRandomValues(a); } while (a[0] >= limit);
        return a[0] % max;
    }
    function randomString(n, chars) { var s = ""; for (var i = 0; i < n; i++) s += chars[randInt(chars.length)]; return s; }
    function uuid() { return crypto.randomUUID ? crypto.randomUUID() : "10000000-1000-4000-8000-100000000000".replace(/[018]/g, function (c) { return (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16); }); }
    function updateChips(chars, l) {
        var html = "<span class='chip'>字符集 " + chars.length + "</span><span class='chip'>模式 " + type.value + "</span>";
        if (typeof l === "number" && chars.length > 1) {
            var entropy = Math.round(l * Math.log2(chars.length));
            var grade = entropy >= 128 ? "极强" : entropy >= 80 ? "强" : entropy >= 60 ? "中等" : "弱";
            html += "<span class='chip'>熵 " + entropy + " bit · " + grade + "</span>";
        }
        chips.innerHTML = html;
    }
    function gen() {
        var n = Math.max(1, Math.min(200, parseInt(count.value, 10) || 1));
        var l = Math.max(1, Math.min(512, parseInt(len.value, 10) || 32));
        var chars = Array.from(type.value === "custom" ? charset.value : (sets[type.value] || ""));
        if (type.value !== "uuid" && !chars.length) {
            status.textContent = "字符集不能为空";
            status.className = "hint bad";
            return;
        }
        var arr = [];
        for (var i = 0; i < n; i++) arr.push(type.value === "uuid" ? uuid() : randomString(l, chars));
        output.textContent = arr.join("\n");
        if (type.value === "uuid") { chips.innerHTML = "<span class='chip'>模式 uuid</span><span class='chip'>熵 122 bit · 极强</span>"; }
        else updateChips(chars, l);
        status.textContent = "已生成 " + n + " 条"; status.className = "hint ok";
    }
    type.onchange = function () { charset.disabled = type.value !== "custom"; len.disabled = type.value === "uuid"; gen(); };
    document.getElementById("gen").onclick = gen;
    document.getElementById("copy").onclick = function () {
        copyText(output.textContent || "").then(function () { status.textContent = "已复制"; status.className = "hint ok"; },
            function () { status.textContent = "复制失败，请手动选择复制"; status.className = "hint bad"; });
    };
    document.getElementById("clear").onclick = function () { output.textContent = ""; status.textContent = "已清空"; };
    charset.disabled = true; gen();
})();
</script>
</body>
</html>
